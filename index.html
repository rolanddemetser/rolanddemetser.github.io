<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ochtendcoach Definitief</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f3f4f6;
      color: #111;
      margin: 0;
      padding: 20px;
    }

    h1 {
      font-size: 34px;
      margin: 0 0 8px 0;
    }

    .sub {
      margin: 0 0 18px 0;
      color: #555;
      font-size: 18px;
      line-height: 1.4;
    }

    input, select, button {
      width: 100%;
      box-sizing: border-box;
      padding: 16px;
      margin-top: 12px;
      font-size: 22px;
      border-radius: 14px;
      border: 1px solid #ccc;
      background: white;
    }

    button {
      background: #111;
      color: white;
      font-weight: 700;
      border: none;
    }

    .card {
      margin-top: 20px;
      padding: 18px;
      border-radius: 16px;
      background: white;
      line-height: 1.45;
      display: none;
    }

    .green { background: #dcfce7; }
    .yellow { background: #fef3c7; }
    .orange { background: #ffedd5; }
    .red { background: #fee2e2; }

    .title {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .line {
      font-size: 19px;
      margin-top: 8px;
    }

    .small {
      font-size: 17px;
      color: #444;
      margin-top: 10px;
    }

    .steps-box {
      margin-top: 14px;
      padding: 12px;
      border-radius: 12px;
      background: rgba(255,255,255,0.55);
      font-size: 20px;
      font-weight: 700;
    }
  </style>
</head>
<body>

  <h1>Ochtendcoach 🔥</h1>
  <p class="sub">Focus op vetverbranding, herstel en realistisch trainen.</p>

  <input id="bb" type="number" placeholder="Body Battery (bv 75)">
  <input id="sleep" type="number" placeholder="Slaapscore (bv 80)">

  <select id="gevoel">
    <option value="goed">Gevoel: goed</option>
    <option value="matig">Gevoel: matig</option>
    <option value="slecht">Gevoel: slecht</option>
  </select>

  <select id="lichaam">
    <option value="fris">Lichaam: fris</option>
    <option value="stram">Lichaam: wat stram</option>
    <option value="moe">Lichaam: moe / stijf</option>
  </select>

  <select id="weer">
    <option value="droog">Weer: droog</option>
    <option value="regen">Weer: regen</option>
  </select>

  <select id="possible">
    <option value="am">Possible: AM</option>
    <option value="pm">Possible: PM</option>
    <option value="evening">Possible: Evening</option>
    <option value="all day">Possible: All day</option>
  </select>

  <button onclick="coach()">Wat vandaag?</button>

  <div id="result" class="card"></div>

  <script>
    function coach() {
      const bb = parseInt(document.getElementById("bb").value);
      const sleep = parseInt(document.getElementById("sleep").value);
      const gevoel = document.getElementById("gevoel").value;
      const lichaam = document.getElementById("lichaam").value;
      const weer = document.getElementById("weer").value;
      const possible = document.getElementById("possible").value;
      const result = document.getElementById("result");

      result.style.display = "block";
      result.className = "card";

      if (isNaN(bb) || isNaN(sleep)) {
        result.innerHTML = `
          <div class="title">Nog niet volledig</div>
          <div class="line">Vul eerst Body Battery en slaapscore in.</div>
        `;
        return;
      }

      let score = 0;

      if (bb >= 80) score += 3;
      else if (bb >= 70) score += 2;
      else if (bb >= 60) score += 1;

      if (sleep >= 80) score += 3;
      else if (sleep >= 70) score += 2;
      else if (sleep >= 60) score += 1;

      if (gevoel === "goed") score += 2;
      else if (gevoel === "matig") score += 1;

      if (lichaam === "fris") score += 2;
      else if (lichaam === "stram") score += 1;

      let titel = "";
      let advies = "";
      let duur = "";
      let stappen = "";
      let hartslag = "";
      let extra = "";
      let timing = "";
      let kleur = "";

      // timinglogica
      if (possible === "am") {
        timing = "Beste timing: voormiddag. Hou het haalbaar en start niet te agressief.";
      } else if (possible === "pm") {
        timing = "Beste timing: namiddag. Compact en doelgericht is hier ideaal.";
      } else if (possible === "evening") {
        timing = "Beste timing: avond. Liever geen te zware sessie laat op de dag.";
      } else {
        timing = "Beste timing: je hebt speelruimte vandaag. Kies het moment waarop je je het best voelt.";
      }

      if (gevoel === "slecht" || lichaam === "moe" || bb < 45 || sleep < 55) {
        titel = "🔴 Hersteldag";

        if (weer === "regen") {
          advies = "Zachte yoga of heel rustige korte wandeling, niet op het strand.";
        } else {
          advies = "Rustige wandeling of zachte yoga.";
        }

        duur = possible === "all day" ? "20–30 min rustig bewegen." : "15–25 min rustig bewegen.";
        stappen = "6000–7000 stappen";
        hartslag = "Liefst onder zone 2.";
        extra = "Geen HASfit. Vandaag herstel boven alles.";
        kleur = "red";
      }

      else if (score <= 5) {
        titel = "🟠 Voorzichtige dag";

        if (weer === "regen") {
          advies = "Rustige gewone wandeling of binnenwandeling. Geen strandwandeling.";
        } else {
          advies = "Rustige zone 2-wandeling.";
        }

        if (possible === "am") duur = "25–35 min wandelen.";
        else if (possible === "pm") duur = "30–35 min wandelen.";
        else if (possible === "evening") duur = "25–30 min wandelen, rustig.";
        else duur = "30–40 min wandelen.";

        stappen = "7500–8500 stappen";
        hartslag = "Ongeveer 95–105 bpm.";
        extra = "Niet forceren. Geen zware HASfit.";
        kleur = "orange";
      }

      else if (score <= 8) {
        titel = "🟡 Goede vetverbrandingsdag";

        if (weer === "regen") {
          advies = "Stevige gewone wandeling in zone 2. Geen strandwandeling.";
        } else {
          advies = "Stevige strandwandeling in zone 2.";
        }

        if (possible === "am") duur = "35–45 min wandelen.";
        else if (possible === "pm") duur = "40–50 min wandelen.";
        else if (possible === "evening") duur = "35–45 min wandelen, niet te laat te intens.";
        else duur = "45–60 min wandelen.";

        stappen = "9000–10000 stappen";
        hartslag = "Ongeveer 95–105 bpm, liever niet boven 110.";
        extra = "Vandaag liever wandelen dan zware HASfit.";
        kleur = "yellow";
      }

      else {
        titel = "🟢 Sterke dag";

        if (weer === "regen") {
          advies = "Stevige gewone wandeling + eventueel korte HASfit. Geen strandwandeling.";
        } else {
          advies = "Strandwandeling met stevig tempo + eventueel korte HASfit.";
        }

        if (possible === "am") duur = "40–50 min wandelen + optioneel 10 min HASfit.";
        else if (possible === "pm") duur = "45–55 min wandelen + korte krachtprikkel.";
        else if (possible === "evening") duur = "35–45 min wandelen + eventueel heel korte HASfit.";
        else duur = "45–60 min wandelen + korte krachtprikkel.";

        stappen = "10000+ stappen";
        hartslag = "Wandelen vooral in zone 2, kracht kort en beheerst.";
        extra = "Goede dag om vetverbranding en training te combineren.";
        kleur = "green";
      }

      result.classList.add(kleur);
      result.innerHTML = `
        <div class="title">${titel}</div>
        <div class="steps-box">Stappendoel: ${stappen}</div>
        <div class="line"><strong>Vandaag:</strong> ${advies}</div>
        <div class="line"><strong>Duur:</strong> ${duur}</div>
        <div class="line"><strong>Hartslag:</strong> ${hartslag}</div>
        <div class="line"><strong>Possible:</strong> ${timing}</div>
        <div class="small">${extra}</div>
      `;
    }
  </script>

</body>
</html>
