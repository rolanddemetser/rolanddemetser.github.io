<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#f3f4f6" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>Pro coach RDM</title>

  <style>
    :root{
      --bg:#f3f4f6;
      --card:#ffffff;
      --text:#111111;
      --muted:#6b7280;
      --line:#e5e7eb;
      --good:#dff7e6;
      --warn:#fff1cc;
      --bad:#ffd9d9;
      --shadow:0 8px 20px rgba(0,0,0,0.05);
      --radius:18px;
    }

    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .wrap{
      max-width:760px;
      margin:0 auto;
      padding:16px 16px 40px;
    }

    h1{
      margin:0 0 6px;
      font-size:34px;
      line-height:1.02;
      font-weight:900;
      letter-spacing:-0.7px;
    }

    .sub{
      color:var(--muted);
      margin:0 0 18px;
      font-weight:650;
      font-size:17px;
      line-height:1.35;
    }

    .card{
      background:var(--card);
      padding:16px;
      border-radius:var(--radius);
      margin-bottom:16px;
      box-shadow:var(--shadow);
    }

    .section-title{
      font-size:20px;
      font-weight:850;
      margin:0 0 12px;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr;
      gap:12px;
    }

    @media (min-width:700px){
      .grid.two{
        grid-template-columns:1fr 1fr;
      }
    }

    label{
      display:block;
      font-weight:760;
      margin:0 0 6px;
      font-size:16px;
    }

    input, select{
      width:100%;
      padding:14px;
      border-radius:14px;
      border:1px solid #d1d5db;
      background:#fff;
      font-size:18px;
      color:#111;
      appearance:none;
      -webkit-appearance:none;
    }

    button{
      width:100%;
      margin-top:16px;
      padding:17px;
      background:#111;
      color:#fff;
      border:none;
      border-radius:14px;
      font-size:20px;
      font-weight:900;
      cursor:pointer;
    }

    .divider{
      height:1px;
      background:var(--line);
      margin:14px 0;
    }

    .verdict{
      padding:18px;
      border-radius:16px;
      font-size:24px;
      line-height:1.12;
      font-weight:900;
      text-align:center;
      margin-bottom:12px;
    }

    .good{ background:var(--good); }
    .mid{ background:var(--warn); }
    .bad{ background:var(--bad); }

    .flag{
      margin-bottom:12px;
      padding:14px;
      border-radius:14px;
      background:var(--bad);
      font-size:18px;
      line-height:1.35;
      font-weight:850;
    }

    .block{
      padding:16px;
      border-radius:16px;
      border:1px solid var(--line);
      margin-bottom:12px;
      background:#fff;
    }

    .kicker{
      font-size:13px;
      color:var(--muted);
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:0.5px;
      margin-bottom:6px;
    }

    .main{
      font-size:30px;
      line-height:1.08;
      font-weight:900;
    }

    .text{
      font-size:18px;
      line-height:1.35;
      color:var(--muted);
      font-weight:750;
    }

    .stats{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-top:4px;
    }

    @media (min-width:700px){
      .stats{
        grid-template-columns:repeat(4,1fr);
      }
    }

    .stat{
      background:#f9fafb;
      padding:12px;
      border-radius:12px;
      border:1px solid var(--line);
    }

    .stat small{
      color:var(--muted);
      font-weight:750;
      display:block;
      margin-bottom:4px;
    }

    .stat b{
      font-size:22px;
      line-height:1.1;
      display:block;
    }

    .empty{
      color:var(--muted);
      font-size:18px;
      font-weight:700;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <h1>🔥 Pro coach RDM</h1>
    <div class="sub">Level 2. Ochtend eerst. Coach bewaakt belasting.</div>

    <div class="card">
      <div class="section-title">Garmin</div>

      <div class="grid two">
        <div>
          <label for="bb">Body Battery</label>
          <input id="bb" type="number" min="0" max="100" value="63" />
        </div>

        <div>
          <label for="sleep">Slaapscore</label>
          <input id="sleep" type="number" min="0" max="100" value="69" />
        </div>

        <div>
          <label for="hrv">HRV</label>
          <input id="hrv" type="number" min="0" max="120" value="53" />
        </div>

        <div>
          <label for="stress">Stress</label>
          <input id="stress" type="number" min="0" max="100" value="20" />
        </div>
      </div>

      <div class="divider"></div>

      <div class="section-title">Check-in</div>

      <div class="grid two">
        <div>
          <label for="gevoel">Gevoel</label>
          <select id="gevoel">
            <option value="goed">goed</option>
            <option value="ok" selected>ok</option>
            <option value="slecht">slecht</option>
          </select>
        </div>

        <div>
          <label for="lichaam">Lichaam</label>
          <select id="lichaam">
            <option value="fris" selected>fris</option>
            <option value="stijf">stijf</option>
            <option value="moe">moe</option>
          </select>
        </div>

        <div>
          <label for="darmen">Darmen</label>
          <select id="darmen">
            <option value="goed" selected>goed</option>
            <option value="traag">traag</option>
            <option value="slecht">slecht</option>
          </select>
        </div>
      </div>

      <div class="divider"></div>

      <div class="section-title">Belastingbewaking</div>

      <div class="grid two">
        <div>
          <label for="days">Dagen op rij getraind</label>
          <select id="days">
            <option value="0">0</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3" selected>3</option>
            <option value="4">4+</option>
          </select>
        </div>

        <div>
          <label for="heavy">Gisteren zwaar getraind?</label>
          <select id="heavy">
            <option value="nee" selected>nee</option>
            <option value="ja">ja</option>
          </select>
        </div>
      </div>

      <button onclick="bereken()">Wat vandaag?</button>
    </div>

    <div class="card" id="result">
      <div class="empty">Nog niets berekend</div>
    </div>
  </div>

  <script>
    function clamp(x, min, max){
      return Math.max(min, Math.min(max, x));
    }

    function hrvToScore(hrv){
      if(hrv >= 75) return 92;
      if(hrv >= 65) return 84;
      if(hrv >= 55) return 76;
      if(hrv >= 45) return 66;
      if(hrv >= 35) return 52;
      return 38;
    }

    function coachUitleg(verdict, days, heavy, stress, darmen){
      if(verdict === "BEWUST LICHT"){
        return "Je zit niet slecht, maar de opeenstapeling van training begint te tellen. Vandaag bewust onder je limiet blijven.";
      }
      if(verdict === "LICHT TRAINEN"){
        return "Je zit in een stabiele opbouwfase. Goed genoeg om te bewegen, niet om te pushen.";
      }
      if(verdict === "GOED OM TE TRAINEN"){
        return "Je lichaam is klaar voor een gecontroleerde trainingsprikkel.";
      }
      if(verdict === "HERSTELDAG"){
        return "Vandaag levert rustiger bewegen meer op dan extra belasting.";
      }
      if(verdict === "STOP"){
        return "Vandaag is herstel de beste keuze.";
      }
      if(verdict === "AFREMMEN"){
        return "Je systeem staat onder druk. Alles forceren werkt vandaag tegen je.";
      }
      if(stress > 45){
        return "Je stress ligt te hoog om nuttig te trainen.";
      }
      if(darmen === "slecht"){
        return "Je buik is vandaag de beperkende factor.";
      }
      if(days >= 3){
        return "De optelsom van de voorbije dagen weegt door.";
      }
      if(heavy === "ja"){
        return "Gisteren zat al genoeg prikkel. Vandaag hou je het lager.";
      }
      return "Vandaag gecontroleerd blijven.";
    }

    function bereken(){
      const bb = clamp(parseInt(document.getElementById("bb").value) || 0, 0, 100);
      const sleep = clamp(parseInt(document.getElementById("sleep").value) || 0, 0, 100);
      const hrv = clamp(parseInt(document.getElementById("hrv").value) || 0, 0, 120);
      const stress = clamp(parseInt(document.getElementById("stress").value) || 0, 0, 100);

      const gevoel = document.getElementById("gevoel").value;
      const lichaam = document.getElementById("lichaam").value;
      const darmen = document.getElementById("darmen").value;

      const days = parseInt(document.getElementById("days").value) || 0;
      const heavy = document.getElementById("heavy").value;

      let score =
        (bb * 0.30) +
        (sleep * 0.25) +
        (hrvToScore(hrv) * 0.25) +
        ((100 - stress) * 0.20);

      if(gevoel === "goed") score += 5;
      if(gevoel === "slecht") score -= 10;

      if(lichaam === "fris") score += 3;
      if(lichaam === "stijf") score -= 6;
      if(lichaam === "moe") score -= 15;

      if(darmen === "traag") score -= 4;
      if(darmen === "slecht") score -= 10;

      if(days === 2) score -= 5;
      if(days === 3) score -= 12;
      if(days >= 4) score -= 18;

      if(heavy === "ja") score -= 8;

      score = Math.round(clamp(score, 0, 100));

      let verdict = "";
      let verdictClass = "mid";
      let doen = "";
      let niet = "";
      let zone = "";
      let stappen = "";
      let dagtype = "";
      let rodeVlag = "";

      if(stress > 45){
        verdict = "AFREMMEN";
        verdictClass = "bad";
        doen = "20–30 min rustig wandelen (ochtend)";
        niet = "geen training";
        zone = "zone 1";
        stappen = "6000–7500";
        dagtype = "afremmen";
        rodeVlag = "Stress te hoog. Vandaag niet doorduwen.";
      }
      else if(darmen === "slecht"){
        verdict = "HERSTELDAG";
        verdictClass = "bad";
        doen = "korte rustige wandeling (ochtend)";
        niet = "geen training";
        zone = "zone 1";
        stappen = "5000–7000";
        dagtype = "herstel";
        rodeVlag = "Buik niet goed. Vandaag simpel houden.";
      }
      else if(days >= 3){
        verdict = "BEWUST LICHT";
        verdictClass = "mid";
        doen = "20–25 min zone 2 (ochtend)";
        niet = "niet forceren, niet verlengen";
        zone = "lage zone 2";
        stappen = "7000–8500";
        dagtype = "licht actief";
        rodeVlag = "Cumulatieve belasting. Vandaag bewust lager houden.";
      }
      else if(heavy === "ja" && score >= 60){
        verdict = "LICHT HOUDEN";
        verdictClass = "mid";
        doen = "20–25 min zone 2 (ochtend)";
        niet = "geen tweede zware prikkel";
        zone = "lage zone 2";
        stappen = "7000–8500";
        dagtype = "licht actief";
        rodeVlag = "Gisteren was al zwaar. Vandaag onder controle blijven.";
      }
      else if(score < 50){
        verdict = "STOP";
        verdictClass = "bad";
        doen = "rustdag";
        niet = "geen training";
        zone = "zone 1";
        stappen = "5000–6500";
        dagtype = "herstel";
      }
      else if(score < 60){
        verdict = "HERSTELDAG";
        verdictClass = "mid";
        doen = "20 min wandelen (ochtend)";
        niet = "geen intensiteit";
        zone = "zone 1";
        stappen = "6000–7500";
        dagtype = "herstel";
      }
      else if(score < 70){
        verdict = "LICHT TRAINEN";
        verdictClass = "mid";
        doen = "25 min zone 2 (ochtend)";
        niet = "niet pushen";
        zone = "lage zone 2";
        stappen = "7000–8500";
        dagtype = "licht actief";
      }
      else{
        verdict = "GOED OM TE TRAINEN";
        verdictClass = "good";
        doen = "30–40 min zone 2 (ochtend)";
        niet = "geen tweede zware prikkel";
        zone = "zone 2";
        stappen = "7500–9500";
        dagtype = "trainbaar";
      }

      if(lichaam === "stijf" && !["STOP","AFREMMEN","HERSTELDAG"].includes(verdict)){
        doen += " + mobiliteit";
      }

      const uitleg = coachUitleg(verdict, days, heavy, stress, darmen);

      document.getElementById("result").innerHTML = `
        <div class="verdict ${verdictClass}">${verdict}</div>

        ${rodeVlag ? `<div class="flag">${rodeVlag}</div>` : ""}

        <div class="block">
          <div class="kicker">Vandaag</div>
          <div class="main">${doen}</div>
        </div>

        <div class="block">
          <div class="kicker">Hou dit in de gaten</div>
          <div class="text">${niet}</div>
        </div>

        <div class="block">
          <div class="kicker">Coach zegt</div>
          <div class="text">${uitleg}</div>
        </div>

        <div class="stats">
          <div class="stat">
            <small>Readiness</small>
            <b>${score}</b>
          </div>
          <div class="stat">
            <small>Zone</small>
            <b>${zone}</b>
          </div>
          <div class="stat">
            <small>Stappen</small>
            <b>${stappen}</b>
          </div>
          <div class="stat">
            <small>Dagtype</small>
            <b>${dagtype}</b>
          </div>
        </div>
      `;
    }
  </script>
</body>
</html>
