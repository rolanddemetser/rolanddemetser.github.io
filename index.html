<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekcoach V6</title>

<style>
body {
    font-family: Arial;
    background: #f5f5f5;
    padding: 15px;
}

h1 {
    text-align: center;
}

.card {
    background: white;
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 15px;
}

input, select {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    margin-bottom: 10px;
    font-size: 16px;
}

button {
    width: 100%;
    padding: 15px;
    font-size: 18px;
    background: black;
    color: white;
    border: none;
    border-radius: 10px;
}

.result {
    font-size: 18px;
    line-height: 1.6;
}
</style>
</head>

<body>

<h1>🔥 Weekcoach V6</h1>

<div class="card">
<h3>Input</h3>

<label>Body Battery</label>
<input id="bb" type="number" value="60">

<label>Slaapscore</label>
<input id="sleep" type="number" value="70">

<label>HRV</label>
<input id="hrv" type="number" value="50">

<label>Stress</label>
<input id="stress" type="number" value="20">

<label>Gevoel</label>
<select id="gevoel">
<option value="30">Slecht</option>
<option value="60" selected>OK</option>
<option value="85">Goed</option>
</select>

<label>Monotony</label>
<input id="mono" type="number" value="5">

<label>Recovery</label>
<input id="recovery" type="number" value="60">

<label>Wanneer trainen?</label>
<select id="moment">
<option value="ochtend">Ochtend</option>
<option value="middag">Middag</option>
<option value="avond">Avond</option>
</select>

<label>Duur</label>
<select id="duur">
<option value="20">20 min</option>
<option value="30">30 min</option>
<option value="45">45 min</option>
<option value="60">60 min</option>
</select>

<button onclick="bereken()">Wat vandaag?</button>
</div>

<div class="card result" id="output">
Resultaat verschijnt hier...
</div>

<script>
function bereken() {

let bb = Number(document.getElementById("bb").value);
let sleep = Number(document.getElementById("sleep").value);
let hrv = Number(document.getElementById("hrv").value);
let stress = Number(document.getElementById("stress").value);
let gevoel = Number(document.getElementById("gevoel").value);
let mono = Number(document.getElementById("mono").value);
let recovery = Number(document.getElementById("recovery").value);
let moment = document.getElementById("moment").value;
let duur = document.getElementById("duur").value;

let readiness =
(bb * 0.35) +
(sleep * 0.20) +
(hrv * 0.20) +
((100 - stress) * 0.15) +
(gevoel * 0.10);

let advies = "";
let type = "";
let hartslag = "";

if (readiness < 50 || recovery < 50) {
    type = "🔴 Rust / herstel";
    advies = "Korte wandeling of yoga";
    hartslag = "Zeer laag";
}
else if (readiness < 65 || mono > 6) {
    type = "🟢 Actief herstel";
    advies = "Rustige wandeling + eventueel yoga";
    hartslag = "Laag (zone 1-2)";
}
else if (readiness < 75) {
    type = "🟡 Zone 2 training";
    advies = "Stevige wandeling";
    hartslag = "Zone 2";
}
else {
    if (mono > 5) {
        type = "🟡 Beperkte training";
        advies = "Geen zware prikkel wegens monotony";
        hartslag = "Zone 2";
    } else {
        type = "🔥 Sterke trainingsdag";
        advies = "Krachttraining of interval";
        hartslag = "Hoger mogelijk";
    }
}

// Aanpassing op moment
if (moment === "avond") {
    advies += " (houd het rustiger voor slaap)";
}

if (moment === "ochtend") {
    advies += " (goede start van de dag)";
}

// Output
document.getElementById("output").innerHTML = `
<b>Readiness:</b> ${Math.round(readiness)} / 100<br><br>
<b>Type dag:</b> ${type}<br>
<b>Advies:</b> ${advies}<br>
<b>Duur:</b> ${duur} min<br>
<b>Hartslag:</b> ${hartslag}
`;

}
</script>

</body>
</html>
