<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro coach RDM</title>

<style>
body{
  font-family:-apple-system,system-ui;
  background:#f3f4f6;
  margin:0;
  padding:16px;
  color:#111;
}

h1{
  font-size:32px;
  margin-bottom:6px;
}

.sub{
  color:#6b7280;
  margin-bottom:16px;
  font-weight:600;
}

.card{
  background:white;
  padding:16px;
  border-radius:16px;
  margin-bottom:16px;
}

label{
  font-weight:700;
  display:block;
  margin-top:10px;
}

input,select{
  width:100%;
  padding:12px;
  margin-top:4px;
  border-radius:10px;
  border:1px solid #ccc;
  font-size:16px;
}

button{
  width:100%;
  margin-top:16px;
  padding:16px;
  background:black;
  color:white;
  border:none;
  border-radius:12px;
  font-size:18px;
  font-weight:800;
}

.verdict{
  padding:18px;
  border-radius:14px;
  font-size:26px;
  font-weight:900;
  margin-bottom:12px;
}

.good{background:#dff7e6;}
.mid{background:#fff1cc;}
.bad{background:#ffd6d6;}

.block{
  padding:14px;
  border-radius:14px;
  border:1px solid #e5e7eb;
  margin-bottom:12px;
}

.big{
  font-size:28px;
  font-weight:900;
}

.small{
  color:#6b7280;
  font-weight:600;
}

.flag{
  background:#ffcaca;
  padding:14px;
  border-radius:14px;
  font-weight:800;
  margin-bottom:12px;
}

.stats{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.stat{
  background:#f9fafb;
  padding:10px;
  border-radius:10px;
}

.stat b{
  font-size:20px;
}
</style>
</head>

<body>

<h1>🔥 Pro coach RDM</h1>
<div class="sub">Level 2. Ochtend eerst. Coach bewaakt je belasting.</div>

<div class="card">

<label>Body Battery</label>
<input id="bb" value="63">

<label>Slaapscore</label>
<input id="sleep" value="69">

<label>HRV</label>
<input id="hrv" value="53">

<label>Stress</label>
<input id="stress" value="20">

<label>Gevoel</label>
<select id="gevoel">
<option>goed</option>
<option selected>ok</option>
<option>slecht</option>
</select>

<label>Lichaam</label>
<select id="lichaam">
<option selected>fris</option>
<option>stijf</option>
<option>moe</option>
</select>

<label>Darmen</label>
<select id="darmen">
<option selected>goed</option>
<option>traag</option>
<option>slecht</option>
</select>

<label>Dagen op rij getraind</label>
<select id="days">
<option>0</option>
<option>1</option>
<option>2</option>
<option selected>3</option>
<option>4</option>
</select>

<label>Gisteren zwaar?</label>
<select id="heavy">
<option selected>nee</option>
<option>ja</option>
</select>

<button onclick="calc()">Wat vandaag?</button>

</div>

<div class="card" id="out">Nog niets berekend</div>

<script>
function hrvScore(h){
 if(h>70) return 90;
 if(h>60) return 80;
 if(h>50) return 70;
 if(h>40) return 60;
 return 45;
}

function calc(){

let bb = +bbEl.value;
let sl = +sleepEl.value;
let hrv = +hrvEl.value;
let st = +stressEl.value;

let gevoel = gevoelEl.value;
let lichaam = lichaamEl.value;
let darmen = darmenEl.value;
let days = daysEl.value;
let heavy = heavyEl.value;

let score =
(bb*0.3)+(sl*0.25)+(hrvScore(hrv)*0.25)+((100-st)*0.2);

if(gevoel=="goed") score+=5;
if(gevoel=="slecht") score-=10;

if(lichaam=="moe") score-=12;
if(lichaam=="stijf") score-=6;

if(darmen=="slecht") score-=10;

if(days==2) score-=5;
if(days==3) score-=10;
if(days>=4) score-=15;

if(heavy=="ja") score-=8;

score=Math.round(score);

let verdict="",className="";
let actie="",niet="",zone="",steps="",flag="";

if(score<50){
 verdict="STOP";
 className="bad";
 actie="rust";
 zone="zone 1";
 steps="5000–6500";
 niet="geen training";
}
else if(score<60){
 verdict="HERSTEL";
 className="mid";
 actie="20 min wandelen";
 zone="zone 1";
 steps="6000–7500";
 niet="geen intensiteit";
}
else if(score<70){
 verdict="TRAIN LICHT";
 className="mid";
 actie="20–25 min zone 2";
 zone="lage zone 2";
 steps="7000–8500";
 niet="niet forceren";
}
else{
 verdict="TRAIN";
 className="good";
 actie="30–40 min zone 2";
 zone="zone 2";
 steps="7500–9500";
 niet="geen 2e zware prikkel";
}

/* harde regels */

if(st>40){
 verdict="AFREMMEN";
 className="bad";
 actie="wandelen";
 zone="zone 1";
 steps="6000–7500";
 niet="geen training";
 flag="Stress te hoog.";
}

if(days>=3){
 flag="Te veel dagen op rij → vandaag bewust lager.";
}

if(heavy=="ja"){
 actie="20–25 min zone 2";
 niet="geen tweede zware prikkel";
}

if(darmen=="slecht"){
 verdict="HERSTEL";
 actie="rustig wandelen";
 niet="geen training";
}

out.innerHTML=`
<div class="verdict ${className}">${verdict}</div>

${flag? `<div class="flag">${flag}</div>`:""}

<div class="block">
<div class="small">DOEN</div>
<div class="big">${actie} (ochtend)</div>
</div>

<div class="block">
<div class="small">NIET DOEN</div>
<div>${niet}</div>
</div>

<div class="stats">
<div class="stat"><small>Readiness</small><b>${score}</b></div>
<div class="stat"><small>Zone</small><b>${zone}</b></div>
<div class="stat"><small>Stappen</small><b>${steps}</b></div>
<div class="stat"><small>Dagtype</small><b>${verdict}</b></div>
</div>
`;
}
</script>

</body>
</html>
