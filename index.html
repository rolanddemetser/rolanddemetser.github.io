<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekcoach V7 Strak</title>

<style>
body {font-family:-apple-system;background:#f2f2f7;margin:0;}
.wrap {padding:16px;}
.card {background:white;border-radius:14px;padding:16px;margin-bottom:16px;}
h1 {font-size:32px;}
input,select {width:100%;padding:12px;margin:6px 0 12px;border-radius:10px;border:1px solid #ccc;}
button {width:100%;padding:16px;background:black;color:white;border:none;border-radius:12px;font-size:18px;}
.chips {display:flex;flex-wrap:wrap;gap:8px;}
.chip {padding:10px 14px;background:#eee;border-radius:20px;cursor:pointer;}
.chip.active {background:black;color:white;}
</style>
</head>

<body>

<div class="wrap">

<h1>🔥 Weekcoach V7</h1>

<div class="card">

<b>Garmin</b>

<input id="bb" placeholder="Body Battery" value="60">
<input id="sleep" placeholder="Slaapscore" value="70">
<input id="hrv" placeholder="HRV" value="50">
<input id="stress" placeholder="Stress" value="20">

<b>Check-in</b>

<select id="gevoel">
<option>slecht</option>
<option selected>ok</option>
<option>goed</option>
</select>

<select id="lichaam">
<option>moe</option>
<option>stijf</option>
<option selected>fris</option>
</select>

<select id="darmen">
<option>goed</option>
<option>traag</option>
<option>slecht</option>
</select>

<b>Moment (meerdere mogelijk)</b>
<div class="chips">
<div class="chip active" onclick="toggle(this)">ochtend</div>
<div class="chip active" onclick="toggle(this)">middag</div>
<div class="chip active" onclick="toggle(this)">avond</div>
</div>

<b>Duur (meerdere mogelijk)</b>
<div class="chips">
<div class="chip active" onclick="toggle(this)">20</div>
<div class="chip active" onclick="toggle(this)">30</div>
<div class="chip active" onclick="toggle(this)">45</div>
<div class="chip" onclick="toggle(this)">60</div>
</div>

<button onclick="bereken()">Wat vandaag?</button>

</div>

<div class="card" id="result">...</div>

</div>

<script>

function toggle(el){
el.classList.toggle("active");
}

function getSelected(index){
return [...document.querySelectorAll(".chips")[index].children]
.filter(c=>c.classList.contains("active"))
.map(c=>c.innerText);
}

function bereken(){

let bb = parseInt(document.getElementById("bb").value);
let sleep = parseInt(document.getElementById("sleep").value);
let hrv = parseInt(document.getElementById("hrv").value);
let stress = parseInt(document.getElementById("stress").value);

let gevoel = document.getElementById("gevoel").value;
let lichaam = document.getElementById("lichaam").value;
let darmen = document.getElementById("darmen").value;

let moments = getSelected(0);
let durations = getSelected(1);

let readiness = Math.round(
(bb*0.3)+(sleep*0.25)+(hrv*0.2)+((100-stress)*0.25)
);

// modifiers
if(gevoel==="slecht") readiness -= 10;
if(lichaam==="moe") readiness -= 10;
if(darmen==="slecht") readiness -= 5;

let type="",plan="",notdo="",steps="",coach="";

// HARD STOP
if(readiness <50){
type="🔴 STOP";
plan="Max 15-20 min wandelen of rust";
notdo="Niet trainen";
steps="5000-6000";
coach="Vandaag niet trainen. Punt.";
}

// HERSTEL
else if(readiness <65){
type="🟠 Herstel";

let dur = durations.includes("30")?"30":"20";
let mom = moments.includes("ochtend")?"ochtend":moments[0];

plan = dur+" min rustige wandeling ("+mom+")";
notdo="Geen kracht, geen versnellingen";
steps="6500-8000";
coach="Je lichaam is niet klaar om te trainen. Bewegen mag, pushen niet.";
}

// LICHTE TRAINING
else if(readiness <75){

type="🟢 Licht actief";

let dur = durations.includes("45")?"45":"30";
let mom = moments.includes("middag")?"middag":moments[0];

plan = dur+" min zone 2 training ("+mom+")";
notdo="Niet tot uitputting";
steps="7500-9000";
coach="Je mag trainen, maar gecontroleerd. Geen heroïsche sessies.";
}

// TRAIN
else{

type="🔵 Train";

let dur = durations.includes("45")?"45":"30";
let mom = moments.includes("middag")?"middag":moments[0];

plan = dur+" min training ("+mom+")";
notdo="Niet overdrijven";
steps="9000-11000";
coach="Groen licht. Vandaag mag je trainen.";
}

document.getElementById("result").innerHTML =

"<b>Readiness:</b> "+readiness+"<br><br>"+
"<b>Dagtype:</b> "+type+"<br><br>"+
"<b>Vandaag doen:</b><br>"+plan+"<br><br>"+
"<b>Vandaag niet doen:</b><br>"+notdo+"<br><br>"+
"<b>Stapdoel:</b> "+steps+"<br><br>"+
"<b>Coach:</b><br>"+coach;

}

</script>

</body>
</html>
