<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Weekcoach PRO</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f3f4f6;
      color: #111;
      margin: 0;
      padding: 20px;
    }

    h1 {
      font-size: 34px;
      margin: 0 0 6px 0;
    }

    .sub {
      margin: 0 0 18px 0;
      color: #555;
      font-size: 18px;
      line-height: 1.4;
    }

    input, select, button {
      width: 100%;
      box-sizing: border-box;
      padding: 16px;
      margin-top: 12px;
      font-size: 22px;
      border-radius: 14px;
      border: 1px solid #ccc;
      background: white;
    }

    button {
      background: #111;
      color: white;
      font-weight: 700;
      border: none;
    }

    .card {
      margin-top: 20px;
      padding: 18px;
      border-radius: 16px;
      background: white;
      line-height: 1.45;
      display: none;
    }

    .green { background: #dcfce7; }
    .yellow { background: #fef3c7; }
    .orange { background: #ffedd5; }
    .red { background: #fee2e2; }

    .title {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .line {
      font-size: 19px;
      margin-top: 8px;
    }

    .small {
      font-size: 17px;
      color: #444;
      margin-top: 10px;
    }

    .box {
      margin-top: 14px;
      padding: 12px;
      border-radius: 12px;
      background: rgba(255,255,255,0.55);
      font-size: 20px;
      font-weight: 700;
    }

    .muted {
      opacity: 0.8;
    }

    .row {
      display: flex;
      gap: 10px;
      margin-top: 12px;
    }

    .row button {
      margin-top: 0;
      font-size: 18px;
      padding: 12px;
    }

    .secondary {
      background: #666;
    }
  </style>
</head>
<body>

  <h1>Weekcoach PRO 🔥</h1>
  <p class="sub">Vetverbranding, herstel en weekbelasting in één coach.</p>

  <input id="bb" type="number" placeholder="Body Battery (bv 75)">
  <input id="sleep" type="number" placeholder="Slaapscore (bv 80)">

  <select id="gevoel">
    <option value="goed">Gevoel: goed</option>
    <option value="matig">Gevoel: matig</option>
    <option value="slecht">Gevoel: slecht</option>
  </select>

  <select id="lichaam">
    <option value="fris">Lichaam: fris</option>
    <option value="stram">Lichaam: wat stram</option>
    <option value="moe">Lichaam: moe / stijf</option>
  </select>

  <select id="weer">
    <option value="droog">Weer: droog</option>
    <option value="regen">Weer: regen</option>
  </select>

  <select id="possible">
    <option value="am">Possible: AM</option>
    <option value="pm">Possible: PM</option>
    <option value="evening">Possible: Evening</option>
    <option value="all day">Possible: All day</option>
  </select>

  <button onclick="coach()">Wat vandaag?</button>

  <div class="row">
    <button class="secondary" onclick="toonWeek()">Toon weekstatus</button>
    <button class="secondary" onclick="resetWeek()">Reset week</button>
  </div>

  <div id="result" class="card"></div>

  <script>
    function berekenDagLoad(bb, sleep, gevoel, lichaam) {
      let load = 0;

      if (bb >= 80) load += 3;
      else if (bb >= 70) load += 2;
      else if (bb >= 60) load += 1;

      if (sleep >= 80) load += 3;
      else if (sleep >= 70) load += 2;
      else if (sleep >= 60) load += 1;

      if (gevoel === "goed") load += 2;
      else if (gevoel === "matig") load += 1;

      if (lichaam === "fris") load += 2;
      else if (lichaam === "stram") load += 1;

      return load;
    }

    function haalWeekData() {
      return JSON.parse(localStorage.getItem("weekcoach_pro") || "[]");
    }

    function bewaarWeekData(data) {
      localStorage.setItem("weekcoach_pro", JSON.stringify(data));
    }

    function gemiddelde(arr) {
      if (!arr.length) return 0;
      return arr.reduce((a, b) => a + b, 0) / arr.length;
    }

    function stddev(arr) {
      if (arr.length < 2) return 0;
      const avg = gemiddelde(arr);
      const variance = gemiddelde(arr.map(x => Math.pow(x - avg, 2)));
      return Math.sqrt(variance);
    }

    function monotony(arr) {
      const avg = gemiddelde(arr);
      const sd = stddev(arr);
      if (sd === 0) return avg > 0 ? 99 : 0;
      return avg / sd;
    }

    function coach() {
      const bb = parseInt(document.getElementById("bb").value);
      const sleep = parseInt(document.getElementById("sleep").value);
      const gevoel = document.getElementById("gevoel").value;
      const lichaam = document.getElementById("lichaam").value;
      const weer = document.getElementById("weer").value;
      const possible = document.getElementById("possible").value;
      const result = document.getElementById("result");

      result.style.display = "block";
      result.className = "card";

      if (isNaN(bb) || isNaN(sleep)) {
        result.innerHTML = `
          <div class="title">Nog niet volledig</div>
          <div class="line">Vul eerst Body Battery en slaapscore in.</div>
        `;
        return;
      }

      const vandaagLoad = berekenDagLoad(bb, sleep, gevoel, lichaam);

      let week = haalWeekData();
      const oudeLoads = week.map(d => d.load);
      const weekGem = gemiddelde(oudeLoads);
      const weekMon = monotony(oudeLoads);

      let titel = "";
      let advies = "";
      let duur = "";
      let stappen = "";
      let hartslag = "";
      let timing = "";
      let waarschuwing = "";
      let kleur = "";
      let coachScore = vandaagLoad;

      if (possible === "am") {
        timing = "Voormiddag: hou het compact en gecontroleerd.";
      } else if (possible === "pm") {
        timing = "Namiddag: goed moment voor een doelgerichte sessie.";
      } else if (possible === "evening") {
        timing = "Avond: liever geen zware of te lange prikkel.";
      } else {
        timing = "All day: kies het moment waarop je je best voelt.";
      }

      if (gevoel === "slecht" || lichaam === "moe" || bb < 45 || sleep < 55) {
        titel = "🔴 Hersteldag";
        advies = weer === "regen"
          ? "Zachte yoga of rustige korte wandeling, niet op het strand."
          : "Rustige wandeling of zachte yoga.";
        duur = possible === "all day" ? "20–30 min rustig bewegen." : "15–25 min rustig bewegen.";
        stappen = "6000–7000 stappen";
        hartslag = "Liefst onder zone 2.";
        waarschuwing = "Niet uitbreiden vandaag. Geen HASfit.";
        kleur = "red";
      }

      else if (week.length >= 3 && weekGem >= 5.5) {
        titel = "🔴 Rust afdwingen";
        advies = weer === "regen"
          ? "Korte gewone wandeling of yoga. Geen strand en geen HASfit."
          : "Korte rustige wandeling of yoga.";
        duur = "20–30 min.";
        stappen = "6500–7500 stappen";
        hartslag = "Rustig, ruim onder zone 2.";
        waarschuwing = "Je weekbelasting is hoog. Vandaag herstel, ook als je je goed voelt.";
        kleur = "red";
      }

      else if (week.length >= 4 && weekMon > 2.2) {
        titel = "🟠 Afremdag";
        advies = weer === "regen"
          ? "Gewone rustige wandeling. Geen strandwandeling."
          : "Rustige zone 2-wandeling zonder tempo-opbouw.";
        duur = "30–40 min.";
        stappen = "7500–8500 stappen";
        hartslag = "Ongeveer 95–102 bpm.";
        waarschuwing = "Je weekpatroon wordt te eenvormig. Vandaag niet pushen.";
        kleur = "orange";
      }

      else if (coachScore <= 5) {
        titel = "🟠 Voorzichtige dag";
        advies = weer === "regen"
          ? "Rustige gewone wandeling of binnenwandeling."
          : "Rustige zone 2-wandeling.";
        duur = possible === "evening" ? "25–30 min rustig." : "30–40 min.";
        stappen = "7500–8500 stappen";
        hartslag = "Ongeveer 95–105 bpm.";
        waarschuwing = "Geen zware HASfit. Blijf binnen plan.";
        kleur = "orange";
      }

      else if (coachScore <= 8) {
        titel = "🟡 Goede vetverbrandingsdag";
        advies = weer === "regen"
          ? "Stevige gewone wandeling in zone 2. Geen strand."
          : "Stevige strandwandeling in zone 2.";
        duur = possible === "am" ? "35–45 min." : possible === "evening" ? "35–45 min, rustig eindigen." : "45–60 min.";
        stappen = "9000–10000 stappen";
        hartslag = "Ongeveer 95–105 bpm, liever niet boven 110.";
        waarschuwing = "Vandaag liever wandelen dan zware HASfit.";
        kleur = "yellow";
      }

      else {
        titel = "🟢 Sterke dag";
        advies = weer === "regen"
          ? "Stevige gewone wandeling + eventueel korte HASfit."
          : "Strandwandeling met stevig tempo + eventueel korte HASfit.";
        duur = possible === "evening" ? "35–45 min wandelen + eventueel heel korte kracht." : "45–60 min wandelen + korte krachtprikkel.";
        stappen = "10000+ stappen";
        hartslag = "Wandelen in zone 2, kracht kort en beheerst.";
        waarschuwing = "Goede dag, maar nog altijd: niet onnodig uitbreiden.";
        kleur = "green";
      }

      week.push({
        date: new Date().toISOString(),
        load: coachScore
      });

      if (week.length > 7) week.shift();
      bewaarWeekData(week);

      const nieuweLoads = week.map(d => d.load);
      const nieuweGem = gemiddelde(nieuweLoads).toFixed(1);
      const nieuweMon = monotony(nieuweLoads).toFixed(1);

      result.classList.add(kleur);
      result.innerHTML = `
        <div class="title">${titel}</div>
        <div class="box">Trainingsscore vandaag: ${coachScore} / 10</div>
        <div class="box">Stappendoel: ${stappen}</div>
        <div class="line"><strong>Vandaag:</strong> ${advies}</div>
        <div class="line"><strong>Duur:</strong> ${duur}</div>
        <div class="line"><strong>Hartslag:</strong> ${hartslag}</div>
        <div class="line"><strong>Possible:</strong> ${timing}</div>
        <div class="line"><strong>Weekbelasting:</strong> gemiddeld ${nieuweGem} / monotony ${nieuweMon}</div>
        <div class="small">${waarschuwing}</div>
      `;
    }

    function toonWeek() {
      const result = document.getElementById("result");
      const week = haalWeekData();
      result.style.display = "block";
      result.className = "card";

      if (!week.length) {
        result.innerHTML = `
          <div class="title">Nog geen weekdata</div>
          <div class="line">Gebruik de coach een paar dagen en de weekstatus komt hier automatisch.</div>
        `;
        return;
      }

      const loads = week.map(d => d.load);
      const gem = gemiddelde(loads).toFixed(1);
      const mon = monotony(loads).toFixed(1);
      const totaal = loads.reduce((a,b) => a+b, 0);

      let status = "Stabiel";
      if (gem >= 5.5) status = "Hoog";
      if (mon > 2.2) status = "Eenvormig / oppassen";

      result.style.display = "block";
      result.className = "card yellow";
      result.innerHTML = `
        <div class="title">Weekstatus</div>
        <div class="line"><strong>Dagen bewaard:</strong> ${week.length}</div>
        <div class="line"><strong>Totale weekload:</strong> ${totaal}</div>
        <div class="line"><strong>Gemiddelde load:</strong> ${gem}</div>
        <div class="line"><strong>Monotony:</strong> ${mon}</div>
        <div class="small">Status: ${status}</div>
      `;
    }

    function resetWeek() {
      localStorage.removeItem("weekcoach_pro");
      const result = document.getElementById("result");
      result.style.display = "block";
      result.className = "card orange";
      result.innerHTML = `
        <div class="title">Week gereset</div>
        <div class="line">De opgeslagen weekbelasting is gewist.</div>
      `;
    }
  </script>

</body>
</html>
