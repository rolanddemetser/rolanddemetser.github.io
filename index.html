<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Coach RDM</title>

<style>
body {
  font-family: -apple-system, sans-serif;
  background: #f2f2f2;
  margin: 0;
  padding: 20px;
  color: #111;
}

h1 {
  font-size: 34px;
  margin-bottom: 5px;
}

.subtitle {
  color: #777;
  font-size: 18px;
  margin-bottom: 20px;
}

.card {
  background: white;
  padding: 18px;
  border-radius: 16px;
  margin-bottom: 15px;
}

label {
  display: block;
  margin-top: 10px;
  font-weight: 600;
  color: #666;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #ddd;
  margin-top: 5px;
  font-size: 16px;
}

button {
  width: 100%;
  padding: 16px;
  border-radius: 14px;
  border: none;
  background: black;
  color: white;
  font-size: 18px;
  margin-top: 20px;
}

.result {
  margin-top: 20px;
}

.verdict {
  padding: 18px;
  border-radius: 14px;
  font-weight: bold;
  font-size: 22px;
  text-align: center;
  margin-bottom: 15px;
}

.light { background: #f4e4b8; }
.medium { background: #f5caa5; }
.stop { background: #f2b2b2; }

.block {
  background: white;
  padding: 15px;
  border-radius: 14px;
  margin-bottom: 12px;
}

.kicker {
  font-size: 13px;
  color: #777;
  margin-bottom: 5px;
}

.main {
  font-size: 20px;
  font-weight: bold;
}

.small {
  color: #555;
}

.stats {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}

.stat {
  flex: 1;
  background: white;
  padding: 10px;
  border-radius: 10px;
  text-align: center;
}

.stat small {
  color: #777;
  font-size: 12px;
}
</style>
</head>

<body>

<h1>🔥 Pro coach RDM</h1>
<div class="subtitle">Level 6. Eén duidelijke beslissing per dag.</div>

<div class="card">
  <h3>Herstel</h3>
  <label>Body Battery</label>
  <input id="bb" type="number">

  <label>Slaapscore</label>
  <input id="sleep" type="number">

  <label>HRV</label>
  <input id="hrv" type="number">

  <label>Stress</label>
  <input id="stress" type="number">
</div>

<div class="card">
  <h3>Check-in</h3>
  <label>Gevoel</label>
  <input id="feel">

  <label>Lichaam</label>
  <input id="body">

  <label>Darmen</label>
  <input id="gut">

  <label>Vermoeidheid stijgt?</label>
  <input id="fatigue">
</div>

<div class="card">
  <h3>Belasting</h3>
  <label>Dagen op rij getraind</label>
  <input id="days" type="number">

  <label>Gisteren zwaar?</label>
  <input id="heavy">

  <label>Trend laatste 3 dagen</label>
  <input id="trend">

  <label>Advies gevolgd?</label>
  <input id="followed">
</div>

<button onclick="coach()">Bepaal mijn dag</button>

<div class="result" id="result"></div>

<script>
function coach() {

  let bb = Number(document.getElementById("bb").value);
  let sleep = Number(document.getElementById("sleep").value);
  let stress = Number(document.getElementById("stress").value);
  let days = Number(document.getElementById("days").value);
  let heavy = document.getElementById("heavy").value;

  let score = bb + sleep - stress;

  let verdict, action, limit, coach;

  if (days >= 3 || heavy === "ja") {
    score -= 20;
  }

  if (score > 120) {
    verdict = "GROEN";
    action = "40 min zone 2 + optioneel kracht";
    limit = "niet overdrijven";
    coach = "Goede dag. Gebruik hem.";
    color = "light";
  }
  else if (score > 90) {
    verdict = "GEEL";
    action = "30 min zone 2";
    limit = "niet versnellen";
    coach = "Controle houden.";
    color = "medium";
  }
  else {
    verdict = "ROOD";
    action = "20 min rustige zone 2. Klaar.";
    limit = "geen tweede training";
    coach = "Je zit in opstapeling. Minder doen.";
    color = "stop";
  }

  document.getElementById("result").innerHTML = `
    <div class="verdict ${color}">
      ${verdict}
    </div>

    <div class="block">
      <div class="kicker">Vandaag</div>
      <div class="main">${action}</div>
    </div>

    <div class="block">
      <div class="kicker">Grens</div>
      <div class="small">${limit}</div>
    </div>

    <div class="block">
      <div class="kicker">Coach</div>
      <div class="small">${coach}</div>
    </div>

    <div class="stats">
      <div class="stat">
        <small>Score</small><br><b>${score}</b>
      </div>
      <div class="stat">
        <small>Dagen</small><br><b>${days}</b>
      </div>
      <div class="stat">
        <small>Status</small><br><b>${verdict}</b>
      </div>
    </div>
  `;
}
</script>

</body>
</html>
