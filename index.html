<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro coach RDM</title>

<style>
:root{
  --bg:#f3f4f6;
  --card:#ffffff;
  --text:#111;
  --muted:#6b7280;
  --line:#e5e7eb;
  --good:#dff7e6;
  --mid:#fff1cc;
  --bad:#ffd9d9;
}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial;
  background:var(--bg);
  color:var(--text);
}

.wrap{
  max-width:760px;
  margin:auto;
  padding:16px;
}

h1{
  font-size:34px;
  font-weight:900;
  margin:0;
}

.sub{
  color:var(--muted);
  margin-bottom:16px;
  font-weight:600;
}

.card{
  background:var(--card);
  padding:16px;
  border-radius:16px;
  margin-bottom:16px;
}

.section{
  font-weight:800;
  margin-bottom:10px;
}

input, select{
  width:100%;
  padding:14px;
  margin-bottom:10px;
  border-radius:12px;
  border:1px solid #ddd;
  font-size:16px;
}

button{
  width:100%;
  padding:16px;
  background:#111;
  color:#fff;
  border:none;
  border-radius:14px;
  font-size:18px;
  font-weight:900;
}

.verdict{
  padding:18px;
  border-radius:14px;
  text-align:center;
  font-weight:900;
  font-size:24px;
  margin-bottom:12px;
}

.good{background:var(--good);}
.mid{background:var(--mid);}
.bad{background:var(--bad);}

.block{
  padding:14px;
  border:1px solid var(--line);
  border-radius:14px;
  margin-bottom:10px;
}

.kicker{
  font-size:12px;
  color:var(--muted);
  font-weight:800;
  margin-bottom:4px;
}

.main{
  font-size:26px;
  font-weight:900;
}

.text{
  font-size:16px;
  color:var(--muted);
  font-weight:600;
}

.flag{
  background:var(--bad);
  padding:14px;
  border-radius:12px;
  font-weight:800;
  margin-bottom:10px;
}

.stats{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.stat{
  background:#f9fafb;
  padding:10px;
  border-radius:10px;
  border:1px solid var(--line);
}

.stat small{
  color:var(--muted);
}

.stat b{
  font-size:18px;
}
</style>
</head>

<body>

<div class="wrap">
  <h1>🔥 Pro coach RDM</h1>
  <div class="sub">Level 2. Ochtend eerst. Coach bewaakt belasting.</div>

  <div class="card">
    <div class="section">Garmin</div>
    <input id="bb" type="number" placeholder="Body Battery" value="63">
    <input id="sleep" type="number" placeholder="Slaapscore" value="69">
    <input id="hrv" type="number" placeholder="HRV" value="53">
    <input id="stress" type="number" placeholder="Stress" value="20">

    <div class="section">Check-in</div>
    <select id="gevoel">
      <option>goed</option>
      <option selected>ok</option>
      <option>slecht</option>
    </select>

    <select id="lichaam">
      <option selected>fris</option>
      <option>stijf</option>
      <option>moe</option>
    </select>

    <select id="darmen">
      <option selected>goed</option>
      <option>traag</option>
      <option>slecht</option>
    </select>

    <div class="section">Belasting</div>
    <select id="days">
      <option>0</option><option>1</option><option>2</option>
      <option selected>3</option><option>4</option>
    </select>

    <select id="heavy">
      <option selected>nee</option>
      <option>ja</option>
    </select>

    <button onclick="run()">Wat vandaag?</button>
  </div>

  <div class="card" id="result">
    Nog niets berekend
  </div>
</div>

<script>

function scoreHRV(hrv){
  if(hrv>70) return 90;
  if(hrv>60) return 80;
  if(hrv>50) return 70;
  if(hrv>40) return 60;
  return 50;
}

function coach(verdict){
  if(verdict==="LICHT HOUDEN"){
    return "Je zit nog goed, maar dit is het kantelpunt. Vandaag onder je limiet blijven.";
  }
  if(verdict==="TRAINEN"){
    return "Je lichaam is klaar. Hou controle en dit wordt een nuttige sessie.";
  }
  if(verdict==="HERSTEL"){
    return "Vandaag win je door minder te doen.";
  }
  if(verdict==="STOP"){
    return "Vandaag niet trainen.";
  }
  return "";
}

function run(){

let bb = +bb.value;
let sleep = +sleep.value;
let hrv = +hrv.value;
let stress = +stress.value;
let days = +document.getElementById("days").value;
let heavy = heavySelect = document.getElementById("heavy").value;

let score =
(bb*0.3)+(sleep*0.25)+(scoreHRV(hrv)*0.25)+((100-stress)*0.2);

if(days>=3) score-=10;
if(days>=4) score-=10;
if(heavy==="ja") score-=8;

score=Math.round(score);

let verdict, cls, doen, niet, vlag="";

if(stress>45){
  verdict="STOP"; cls="bad";
  doen="wandelen";
  niet="geen training";
  vlag="Stress te hoog";
}
else if(days>=3){
  verdict="LICHT HOUDEN"; cls="mid";
  doen="20–25 min zone 2";
  niet="niet forceren";
  vlag="3 dagen op rij getraind";
}
else if(score>70){
  verdict="TRAINEN"; cls="good";
  doen="30–40 min zone 2";
  niet="niet overdrijven";
}
else if(score>55){
  verdict="LICHT"; cls="mid";
  doen="25 min zone 2";
  niet="niet pushen";
}
else{
  verdict="HERSTEL"; cls="bad";
  doen="wandelen";
  niet="geen intensiteit";
}

document.getElementById("result").innerHTML = `
<div class="verdict ${cls}">${verdict}</div>

<div class="block">
<div class="kicker">Vandaag</div>
<div class="main">${doen}</div>
</div>

<div class="block">
<div class="kicker">Rem</div>
<div class="text">${niet}</div>
</div>

${vlag? `<div class="flag">${vlag}</div>`:""}

<div class="block">
<div class="kicker">Coach</div>
<div class="text">${coach(verdict)}</div>
</div>

<div class="stats">
<div class="stat"><small>Score</small><b>${score}</b></div>
<div class="stat"><small>Zone</small><b>zone 2</b></div>
<div class="stat"><small>Stappen</small><b>7000–9000</b></div>
<div class="stat"><small>Dagtype</small><b>${verdict}</b></div>
</div>
`;

}
</script>

</body>
</html>
