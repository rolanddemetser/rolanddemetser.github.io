<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coach RDM</title>

<style>
body{
  margin:0;
  font-family:-apple-system;
  background:#f3f4f6;
}

.wrap{
  max-width:720px;
  margin:auto;
  padding:16px;
}

h1{
  font-size:34px;
  font-weight:900;
}

.sub{
  color:#6b7280;
  margin-bottom:16px;
  font-weight:600;
}

.card{
  background:#fff;
  padding:16px;
  border-radius:18px;
  margin-bottom:16px;
}

label{
  font-weight:700;
  margin-top:10px;
  display:block;
}

input,select{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:1px solid #ddd;
  font-size:18px;
  margin-top:4px;
}

button{
  width:100%;
  margin-top:14px;
  padding:16px;
  background:#111;
  color:#fff;
  border:none;
  border-radius:14px;
  font-size:20px;
  font-weight:900;
}

.verdict{
  padding:18px;
  border-radius:16px;
  font-size:22px;
  font-weight:900;
}

.good{background:#dff7e6;}
.mid{background:#fff1cc;}
.bad{background:#ffe0e0;}

.action{
  margin-top:12px;
  padding:16px;
  border-radius:16px;
  border:1px solid #e5e7eb;
}

.do{
  font-size:28px;
  font-weight:900;
}

.dont{
  margin-top:10px;
  color:#6b7280;
  font-weight:700;
}

.stats{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:12px;
}

.stat{
  background:#f9fafb;
  padding:12px;
  border-radius:12px;
}

.stat small{color:#6b7280;}
.stat b{font-size:22px;}
</style>
</head>

<body>

<div class="wrap">

<h1>🔥 Coach RDM</h1>
<div class="sub">Ochtend eerst. Jij vult in, de coach beslist.</div>

<div class="card">

<label>Body Battery</label>
<input id="bb" value="63">

<label>Slaapscore</label>
<input id="sleep" value="69">

<label>HRV</label>
<input id="hrv" value="53">

<label>Stress</label>
<input id="stress" value="20">

<label>Gevoel</label>
<select id="gevoel">
<option>slecht</option>
<option selected>ok</option>
<option>goed</option>
</select>

<label>Lichaam</label>
<select id="lichaam">
<option>moe</option>
<option>stijf</option>
<option selected>fris</option>
</select>

<label>Darmen</label>
<select id="darmen">
<option selected>goed</option>
<option>traag</option>
<option>slecht</option>
</select>

<button onclick="run()">Wat vandaag?</button>

</div>

<div class="card" id="result">Nog niets berekend</div>

</div>

<script>

function run(){

let bb=+bb.value
let sleep=+sleep.value
let hrv=+hrv.value
let stress=+stress.value

let score = (bb*0.3)+(sleep*0.25)+(hrv*0.25)+((100-stress)*0.2)

if(gevoel.value=="goed") score+=5
if(gevoel.value=="slecht") score-=10

if(lichaam.value=="moe") score-=12
if(lichaam.value=="stijf") score-=6

if(darmen.value=="slecht") score-=8
if(darmen.value=="traag") score-=4

score=Math.round(Math.max(0,Math.min(100,score)))

let verdict=""
let kleur="mid"
let actie=""
let dont="niet tot uitputting"
let duur=0

// STRAKKE LOGICA
if(score<55){
  verdict="STOP"
  kleur="bad"
  actie="rust / korte wandeling"
  dont="geen training"
}
else if(score<65){
  verdict="HERSTEL"
  actie="20 min wandelen of yoga"
}
else if(score<75){
  verdict="TRAIN – licht"
  actie="30 min zone 2 (ochtend)"
}
else if(score<85){
  verdict="TRAIN"
  kleur="good"
  actie="45 min zone 2 (ochtend)"
}
else{
  verdict="TOPDAG"
  kleur="good"
  actie="45–60 min (ochtend)"
}

// extra veiligheid
if(stress>40){
  actie="korter trainen"
}

// output
document.getElementById("result").innerHTML=`
<div class="verdict ${kleur}">${verdict}</div>

<div class="action">
<div class="do">${actie}</div>
<div class="dont">${dont}</div>
</div>

<div class="stats">
<div class="stat"><small>Readiness</small><b>${score}</b></div>
<div class="stat"><small>Focus</small><b>ochtend</b></div>
</div>
`

}

</script>

</body>
</html>
