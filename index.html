<!DOCTYPE html>
<html lang="nl">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Coach RDM</title>

<style>
body{
  font-family:-apple-system;
  background:#f3f4f6;
  margin:0;
  padding:16px;
}

h1{
  font-size:34px;
  font-weight:900;
  margin-bottom:8px;
}

.sub{
  color:#6b7280;
  font-weight:700;
  margin-bottom:20px;
}

.card{
  background:white;
  padding:16px;
  border-radius:20px;
  margin-bottom:16px;
}

input, select{
  width:100%;
  padding:14px;
  margin-bottom:12px;
  border-radius:12px;
  border:1px solid #ddd;
  font-size:16px;
}

button{
  width:100%;
  padding:16px;
  background:black;
  color:white;
  border:none;
  border-radius:14px;
  font-size:18px;
  font-weight:900;
}

.verdict{
  padding:16px;
  border-radius:16px;
  font-size:26px;
  font-weight:900;
  text-align:center;
  margin-bottom:12px;
}

.mid{ background:#f5e7c2; }
.bad{ background:#f6d4d4; }
.good{ background:#dff7e6; }

.block{
  background:white;
  padding:16px;
  border-radius:16px;
  margin-bottom:12px;
}

.title{
  font-size:13px;
  color:#6b7280;
  font-weight:900;
}

.big{
  font-size:26px;
  font-weight:900;
}

.hidden{
  display:none;
}
</style>
</head>

<body>

<h1>🔥 Pro coach RDM</h1>
<div class="sub">Level 6. Één duidelijke beslissing per dag.</div>

<!-- RESULT -->
<div id="result"></div>

<!-- FORM -->
<div id="form" class="card">

<input id="bb" value="63" placeholder="Body Battery">
<input id="sleep" value="69" placeholder="Slaapscore">
<input id="hrv" value="53" placeholder="HRV">
<input id="stress" value="20" placeholder="Stress">

<select id="days">
<option>0</option>
<option>1</option>
<option>2</option>
<option selected>3</option>
<option>4</option>
</select>

<select id="trend">
<option>beter</option>
<option selected>stabiel</option>
<option>slechter</option>
</select>

<button onclick="run()">Bepaal mijn dag</button>

</div>

<script>
function run(){

let bb = Number(document.getElementById("bb").value);
let sleep = Number(document.getElementById("sleep").value);
let hrv = Number(document.getElementById("hrv").value);
let stress = Number(document.getElementById("stress").value);
let days = Number(document.getElementById("days").value);

let readiness =
(bb*0.4)+(sleep*0.3)+(hrv*0.2)+((100-stress)*0.1);

let verdict="";
let color="";
let action="";

if(days>=3 || readiness<60){
verdict="BEWUST LICHT";
color="mid";
action="20–25 min rustige zone 2";
}
else{
verdict="OPBOUW";
color="good";
action="30–40 min zone 2";
}

document.getElementById("result").innerHTML=`

<div class="card">

<div class="verdict ${color}">
${verdict}
</div>

<div class="block">
<div class="title">Vandaag</div>
<div class="big">${action}</div>
Niet meer.
</div>

<div class="block">
<div class="title">Coach</div>
Minder doen is vandaag juist.
</div>

</div>
`;


// 🔥 KEY: FORM VERBERGEN
document.getElementById("form").classList.add("hidden");

// 🔥 SCROLL NAAR BOVEN
window.scrollTo({top:0,behavior:"smooth"});

}
</script>

</body>
</html>
