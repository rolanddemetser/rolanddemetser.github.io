<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <!-- iPhone app gedrag -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Pro Coach">
  <meta name="theme-color" content="#f3f4f6">

  <title>Pro Coach RDM</title>

  <style>
    body {
      margin:0;
      font-family:-apple-system;
      background:#f3f4f6;
      color:#111;
    }

    .wrap {
      padding:20px;
      max-width:700px;
      margin:auto;
    }

    h1 {
      font-size:32px;
      margin:0 0 10px;
      font-weight:900;
    }

    .sub {
      color:#6b7280;
      font-weight:700;
      margin-bottom:20px;
    }

    .card {
      background:white;
      padding:16px;
      border-radius:18px;
      margin-bottom:16px;
    }

    label {
      display:block;
      font-size:12px;
      color:#6b7280;
      font-weight:800;
      margin-bottom:4px;
    }

    input, select {
      width:100%;
      padding:12px;
      border-radius:12px;
      border:1px solid #ddd;
      font-size:16px;
      margin-bottom:10px;
    }

    button {
      width:100%;
      padding:16px;
      border:none;
      border-radius:14px;
      background:black;
      color:white;
      font-size:18px;
      font-weight:900;
    }

    .verdict {
      padding:20px;
      text-align:center;
      font-size:26px;
      font-weight:900;
      border-radius:14px;
      margin-bottom:12px;
    }

    .light { background:#f5e7c2; }
    .red { background:#f6d4d4; }
    .green { background:#dff7e6; }

    .block {
      background:white;
      padding:14px;
      border-radius:14px;
      margin-bottom:10px;
      border:1px solid #eee;
    }

    .title {
      font-size:12px;
      color:#6b7280;
      font-weight:800;
      margin-bottom:6px;
    }

    .big {
      font-size:26px;
      font-weight:900;
    }

    .notmore {
      margin-top:12px;
      font-size:20px;
      font-weight:900;
    }
  </style>
</head>

<body>

<div class="wrap">
  <h1>🔥 Pro coach RDM</h1>
  <div class="sub">Level 6. Eén duidelijke beslissing per dag.</div>

  <div class="card">
    <label>Body Battery</label>
    <input id="bb" value="63">

    <label>Slaapscore</label>
    <input id="sleep" value="69">

    <label>HRV</label>
    <input id="hrv" value="53">

    <label>Stress</label>
    <input id="stress" value="20">

    <label>Dagen op rij</label>
    <select id="days">
      <option>0</option>
      <option>1</option>
      <option>2</option>
      <option selected>3</option>
      <option>4</option>
    </select>

    <label>Trend</label>
    <select id="trend">
      <option>beter</option>
      <option selected>stabiel</option>
      <option>slechter</option>
    </select>

    <button onclick="run()">Bepaal mijn dag</button>
  </div>

  <div id="result"></div>
</div>

<script>
function run(){

  let bb = Number(document.getElementById("bb").value || 0);
  let sleep = Number(document.getElementById("sleep").value || 0);
  let hrv = Number(document.getElementById("hrv").value || 0);
  let stress = Number(document.getElementById("stress").value || 0);
  let days = Number(document.getElementById("days").value || 0);
  let trend = document.getElementById("trend").value;

  let readiness =
    (bb * 0.4) +
    (sleep * 0.3) +
    (hrv * 0.2) +
    ((100 - stress) * 0.1);

  let verdict = "";
  let color = "";
  let action = "";

  if (days >= 3 || readiness < 60){
    verdict = "BEWUST LICHT";
    color = "light";
    action = "20–25 min rustige zone 2 (ochtend)";
  }
  else if (readiness < 40){
    verdict = "HERSTEL";
    color = "red";
    action = "rust of korte wandeling";
  }
  else{
    verdict = "OPBOUW";
    color = "green";
    action = "30–40 min zone 2";
  }

  document.getElementById("result").innerHTML = `
    <div class="card">

      <div class="verdict ${color}">
        ${verdict}
      </div>

      <div class="block">
        <div class="title">Vandaag</div>
        <div class="big">${action}</div>
        <div class="notmore">Niet meer.</div>
      </div>

      <div class="block">
        <div class="title">Coach</div>
        Minder doen is vandaag juist.
      </div>

    </div>
  `;
}
</script>

</body>
</html>
