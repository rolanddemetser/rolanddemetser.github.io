<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#f3f4f6" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>Pro coach RDM — Level 5</title>

  <style>
    :root{
      --bg:#f3f4f6;
      --card:#ffffff;
      --text:#111111;
      --muted:#6b7280;
      --line:#e5e7eb;

      --green:#dff7e6;
      --yellow:#fff1cc;
      --red:#ffd9d9;
      --blue:#e8f1ff;

      --shadow:0 8px 20px rgba(0,0,0,0.05);
      --radius:18px;
    }

    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .wrap{
      max-width:780px;
      margin:0 auto;
      padding:16px 16px 40px;
    }

    h1{
      margin:0 0 6px;
      font-size:34px;
      line-height:1.02;
      font-weight:900;
      letter-spacing:-0.7px;
    }

    .sub{
      color:var(--muted);
      margin:0 0 18px;
      font-weight:650;
      font-size:17px;
      line-height:1.35;
    }

    .card{
      background:var(--card);
      padding:16px;
      border-radius:18px;
      margin-bottom:16px;
      box-shadow:var(--shadow);
    }

    .section-title{
      font-size:20px;
      font-weight:900;
      margin:0 0 12px;
      letter-spacing:-0.2px;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr;
      gap:12px;
    }

    @media (min-width:720px){
      .grid.two{
        grid-template-columns:1fr 1fr;
      }
    }

    label{
      display:block;
      font-weight:760;
      margin:0 0 6px;
      font-size:15px;
      color:var(--muted);
      text-transform:uppercase;
      letter-spacing:0.4px;
    }

    input, select{
      width:100%;
      padding:14px;
      border-radius:14px;
      border:1px solid #d1d5db;
      background:#fff;
      font-size:18px;
      color:#111;
      appearance:none;
      -webkit-appearance:none;
    }

    button{
      width:100%;
      margin-top:16px;
      padding:17px;
      background:#111;
      color:#fff;
      border:none;
      border-radius:14px;
      font-size:20px;
      font-weight:900;
      cursor:pointer;
    }

    .divider{
      height:1px;
      background:var(--line);
      margin:14px 0;
    }

    .pill{
      display:inline-block;
      padding:8px 12px;
      border-radius:999px;
      font-size:13px;
      font-weight:900;
      letter-spacing:0.4px;
      text-transform:uppercase;
      background:#eef2f7;
      color:#374151;
      margin-bottom:10px;
    }

    .verdict{
      padding:18px;
      border-radius:16px;
      font-size:26px;
      line-height:1.08;
      font-weight:900;
      text-align:center;
      margin-bottom:12px;
      letter-spacing:-0.4px;
    }

    .good{ background:var(--green); }
    .mid{ background:var(--yellow); }
    .bad{ background:var(--red); }

    .flag{
      margin-bottom:12px;
      padding:14px;
      border-radius:14px;
      background:var(--red);
      font-size:18px;
      line-height:1.3;
      font-weight:850;
    }

    .block{
      padding:16px;
      border-radius:16px;
      border:1px solid var(--line);
      margin-bottom:12px;
      background:#fff;
    }

    .kicker{
      font-size:13px;
      color:var(--muted);
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:0.6px;
      margin-bottom:6px;
    }

    .main{
      font-size:30px;
      line-height:1.08;
      font-weight:900;
      letter-spacing:-0.5px;
    }

    .text{
      font-size:18px;
      line-height:1.35;
      color:#4b5563;
      font-weight:750;
    }

    .stats{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-top:4px;
    }

    @media (min-width:720px){
      .stats{
        grid-template-columns:repeat(4,1fr);
      }
    }

    .stat{
      background:#f9fafb;
      padding:12px;
      border-radius:12px;
      border:1px solid var(--line);
    }

    .stat small{
      color:var(--muted);
      font-weight:750;
      display:block;
      margin-bottom:4px;
      text-transform:uppercase;
      letter-spacing:0.3px;
    }

    .stat b{
      font-size:22px;
      line-height:1.1;
      display:block;
      letter-spacing:-0.3px;
    }

    .weekbox{
      background:#f9fafb;
      border:1px solid var(--line);
      border-radius:16px;
      padding:16px;
    }

    .weekrow{
      margin:0 0 10px;
    }

    .weekrow:last-child{
      margin-bottom:0;
    }

    .empty{
      color:var(--muted);
      font-size:18px;
      font-weight:700;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <h1>🔥 Pro coach RDM</h1>
    <div class="sub">Level 5. Coach stuurt je dag, bewaakt je trend en corrigeert gedrag.</div>

    <div class="card">
      <div class="section-title">Hersteldata</div>

      <div class="grid two">
        <div>
          <label for="bb">Body Battery</label>
          <input id="bb" type="number" min="0" max="100" value="63" />
        </div>

        <div>
          <label for="sleep">Slaapscore</label>
          <input id="sleep" type="number" min="0" max="100" value="69" />
        </div>

        <div>
          <label for="hrv">HRV</label>
          <input id="hrv" type="number" min="0" max="120" value="53" />
        </div>

        <div>
          <label for="stress">Stress</label>
          <input id="stress" type="number" min="0" max="100" value="20" />
        </div>
      </div>

      <div class="divider"></div>

      <div class="section-title">Hoe voel je je</div>

      <div class="grid two">
        <div>
          <label for="gevoel">Gevoel</label>
          <select id="gevoel">
            <option value="goed">goed</option>
            <option value="ok" selected>ok</option>
            <option value="slecht">slecht</option>
          </select>
        </div>

        <div>
          <label for="lichaam">Lichaam</label>
          <select id="lichaam">
            <option value="fris" selected>fris</option>
            <option value="stijf">stijf</option>
            <option value="moe">moe</option>
          </select>
        </div>

        <div>
          <label for="darmen">Darmen</label>
          <select id="darmen">
            <option value="goed" selected>goed</option>
            <option value="traag">traag</option>
            <option value="slecht">slecht</option>
          </select>
        </div>

        <div>
          <label for="moeTrend">Vermoeidheid stijgt?</label>
          <select id="moeTrend">
            <option value="nee" selected>nee</option>
            <option value="ja">ja</option>
          </select>
        </div>
      </div>

      <div class="divider"></div>

      <div class="section-title">Trainingsstatus</div>

      <div class="grid two">
        <div>
          <label for="days">Dagen op rij</label>
          <select id="days">
            <option value="0">0</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3" selected>3</option>
            <option value="4">4+</option>
          </select>
        </div>

        <div>
          <label for="heavy">Gisteren zwaar?</label>
          <select id="heavy">
            <option value="nee" selected>nee</option>
            <option value="ja">ja</option>
          </select>
        </div>

        <div>
          <label for="trend">Trend laatste 3 dagen</label>
          <select id="trend">
            <option value="beter">beter</option>
            <option value="stabiel" selected>stabiel</option>
            <option value="slechter">slechter</option>
          </select>
        </div>

        <div>
          <label for="followed">Gisteren advies gevolgd?</label>
          <select id="followed">
            <option value="ja" selected>ja</option>
            <option value="nee">nee</option>
          </select>
        </div>
      </div>

      <button onclick="bereken()">Bepaal mijn dag</button>
    </div>

    <div class="card" id="result">
      <div class="empty">Nog niets berekend</div>
    </div>
  </div>

  <script>
    function clamp(x, min, max){
      return Math.max(min, Math.min(max, x));
    }

    function hrvToScore(hrv){
      if(hrv >= 75) return 92;
      if(hrv >= 65) return 84;
      if(hrv >= 55) return 76;
      if(hrv >= 45) return 66;
      if(hrv >= 35) return 52;
      return 38;
    }

    function coachTekst(verdict){
      if(verdict === "OPBOUWEN") return "Vandaag mag je werken, maar proper. Opbouwen, niet bewijzen.";
      if(verdict === "LICHT TRAINEN") return "Je houdt de motor draaiend, maar je verhoogt niets.";
      if(verdict === "BEWUST LICHT") return "Je zit in opstapeling. Minder doen is vandaag de slimme keuze.";
      if(verdict === "HERSTELDAG") return "Vandaag moet herstel primeren op ambitie.";
      if(verdict === "AFREMMEN") return "Vandaag rem je. Dat voorkomt dat morgen slechter wordt.";
      if(verdict === "STOP") return "Geen training. Vandaag is puur schade beperken.";
      return "Blijf gecontroleerd.";
    }

    function morgenTekst(verdict){
      if(verdict === "OPBOUWEN") return "Als je controle houdt, blijft morgen waarschijnlijk stabiel.";
      if(verdict === "LICHT TRAINEN") return "Licht houden vandaag bewaart opties voor morgen.";
      if(verdict === "BEWUST LICHT") return "Vandaag terugnemen geeft morgen opnieuw ruimte.";
      if(verdict === "HERSTELDAG") return "Herstel vandaag vergroot de kans op een betere morgen.";
      if(verdict === "AFREMMEN") return "Remmen vandaag voorkomt extra verval morgen.";
      if(verdict === "STOP") return "Rust vandaag is nodig om niet verder te zakken.";
      return "Vandaag bepaalt morgen.";
    }

    function weekStatus(days, heavy, trend, verdict, followed){
      let belasting = "laag";
      if(days === 2) belasting = "matig";
      if(days === 3) belasting = "hoog";
      if(days >= 4) belasting = "zeer hoog";
      if(heavy === "ja" && days >= 2) belasting = "hoog";

      let hersteltrend = "stabiel";
      if(trend === "beter") hersteltrend = "stijgend";
      if(trend === "slechter") hersteltrend = "dalend";

      let advies = "stabiel houden";
      if(verdict === "OPBOUWEN") advies = "gecontroleerd verderbouwen";
      if(verdict === "LICHT TRAINEN") advies = "niet verhogen";
      if(verdict === "BEWUST LICHT") advies = "belasting laag houden";
      if(verdict === "HERSTELDAG") advies = "herstel prioriteit geven";
      if(verdict === "AFREMMEN" || verdict === "STOP") advies = "geen extra belasting";

      let gedrag = followed === "ja" ? "coach gevolgd" : "coach genegeerd";

      return { belasting, hersteltrend, advies, gedrag };
    }

    function bereken(){
      const bb = clamp(parseInt(document.getElementById("bb").value) || 0, 0, 100);
      const sleep = clamp(parseInt(document.getElementById("sleep").value) || 0, 0, 100);
      const hrv = clamp(parseInt(document.getElementById("hrv").value) || 0, 0, 120);
      const stress = clamp(parseInt(document.getElementById("stress").value) || 0, 0, 100);

      const gevoel = document.getElementById("gevoel").value;
      const lichaam = document.getElementById("lichaam").value;
      const darmen = document.getElementById("darmen").value;
      const moeTrend = document.getElementById("moeTrend").value;

      const daysRaw = document.getElementById("days").value;
      const days = daysRaw === "4" ? 4 : parseInt(daysRaw) || 0;
      const heavy = document.getElementById("heavy").value;
      const trend = document.getElementById("trend").value;
      const followed = document.getElementById("followed").value;

      let score =
        (bb * 0.30) +
        (sleep * 0.25) +
        (hrvToScore(hrv) * 0.25) +
        ((100 - stress) * 0.20);

      if(gevoel === "goed") score += 5;
      if(gevoel === "slecht") score -= 10;

      if(lichaam === "fris") score += 3;
      if(lichaam === "stijf") score -= 6;
      if(lichaam === "moe") score -= 15;

      if(darmen === "traag") score -= 4;
      if(darmen === "slecht") score -= 10;

      if(days === 2) score -= 5;
      if(days === 3) score -= 12;
      if(days >= 4) score -= 18;

      if(heavy === "ja") score -= 8;

      if(trend === "beter") score += 3;
      if(trend === "slechter") score -= 8;

      if(moeTrend === "ja") score -= 8;
      if(followed === "nee") score -= 6;

      score = Math.round(clamp(score, 0, 100));

      let verdict = "";
      let verdictClass = "mid";
      let reden = "";
      let doen = "";
      let grens = "";
      let zone = "";
      let stappen = "";
      let dagtype = "";
      let rodeVlag = "";

      // hardste remregels eerst
      if(stress > 45){
        verdict = "AFREMMEN";
        verdictClass = "bad";
        reden = "Stress ligt te hoog.";
        doen = "20–30 min rustig wandelen (ochtend)";
        grens = "geen training";
        zone = "zone 1";
        stappen = "6000–7500";
        dagtype = "afremmen";
        rodeVlag = "Vandaag niet doorduwen.";
      }
      else if(darmen === "slecht"){
        verdict = "HERSTELDAG";
        verdictClass = "bad";
        reden = "Buik is vandaag de beperkende factor.";
        doen = "korte rustige wandeling (ochtend)";
        grens = "geen training";
        zone = "zone 1";
        stappen = "5000–7000";
        dagtype = "herstel";
        rodeVlag = "Vandaag simpel houden.";
      }
      else if(days >= 3 && trend === "slechter"){
        verdict = "AFREMMEN";
        verdictClass = "bad";
        reden = "Belasting stapelt op en trend daalt.";
        doen = "20 min wandelen of rustige yoga (ochtend)";
        grens = "geen extra trainingsprikkel";
        zone = "zone 1";
        stappen = "6000–7500";
        dagtype = "afremmen";
        rodeVlag = "Vandaag stoppen met opstapelen.";
      }
      else if(days >= 3 && followed === "nee"){
        verdict = "HERSTELDAG";
        verdictClass = "bad";
        reden = "Je negeerde gisteren de grens terwijl de belasting al opliep.";
        doen = "20 min rustig wandelen (ochtend)";
        grens = "geen zone 2 vandaag";
        zone = "zone 1";
        stappen = "6000–7500";
        dagtype = "herstel";
        rodeVlag = "Coach corrigeert: vandaag lager dan gepland.";
      }
      else if(days >= 3 || moeTrend === "ja"){
        verdict = "BEWUST LICHT";
        verdictClass = "mid";
        reden = "Opstapeling begint te tellen.";
        doen = "20–25 min rustige zone 2 (ochtend)";
        grens = "niet versnellen, niet verlengen, geen tweede training";
        zone = "lage zone 2";
        stappen = "7000–8500";
        dagtype = "licht actief";
        rodeVlag = "Vandaag verlaag je belasting.";
      }
      else if(heavy === "ja" && score >= 60){
        verdict = "LICHT TRAINEN";
        verdictClass = "mid";
        reden = "Gisteren zat de zware prikkel al.";
        doen = "20–25 min zone 2 (ochtend)";
        grens = "geen tweede zware prikkel";
        zone = "lage zone 2";
        stappen = "7000–8500";
        dagtype = "licht actief";
      }
      else if(score < 48){
        verdict = "STOP";
        verdictClass = "bad";
        reden = "Herstel is onvoldoende.";
        doen = "rustdag";
        grens = "geen training";
        zone = "zone 1";
        stappen = "5000–6500";
        dagtype = "herstel";
      }
      else if(score < 58){
        verdict = "HERSTELDAG";
        verdictClass = "mid";
        reden = "Paraatheid is te laag voor echte trainingswinst.";
        doen = "20 min wandelen (ochtend)";
        grens = "geen intensiteit";
        zone = "zone 1";
        stappen = "6000–7500";
        dagtype = "herstel";
      }
      else if(score < 70){
        verdict = "LICHT TRAINEN";
        verdictClass = "mid";
        reden = "Goed genoeg om te bewegen, niet om te pushen.";
        doen = "25 min zone 2 (ochtend)";
        grens = "niet pushen";
        zone = "lage zone 2";
        stappen = "7000–8500";
        dagtype = "licht actief";
      }
      else{
        verdict = "OPBOUWEN";
        verdictClass = "good";
        reden = "Je cijfers laten een gecontroleerde trainingsprikkel toe.";
        doen = "30–40 min zone 2 (ochtend)";
        grens = "geen tweede zware prikkel";
        zone = "zone 2";
        stappen = "7500–9500";
        dagtype = "trainbaar";
      }

      if(lichaam === "stijf" && !["STOP","AFREMMEN","HERSTELDAG"].includes(verdict)){
        doen += " + 5–10 min mobiliteit";
      }

      const coach = coachTekst(verdict);
      const morgen = morgenTekst(verdict);
      const week = weekStatus(days, heavy, trend, verdict, followed);

      document.getElementById("result").innerHTML = `
        <div class="pill">Dagsturing</div>
        <div class="verdict ${verdictClass}">${verdict}</div>

        <div class="block">
          <div class="kicker">Belangrijkste reden</div>
          <div class="text">${reden}</div>
        </div>

        ${rodeVlag ? `<div class="flag">${rodeVlag}</div>` : ""}

        <div class="block">
          <div class="kicker">Vandaag</div>
          <div class="main">${doen}</div>
        </div>

        <div class="block">
          <div class="kicker">Grens</div>
          <div class="text">${grens}</div>
        </div>

        <div class="block">
          <div class="kicker">Coach</div>
          <div class="text">${coach}</div>
        </div>

        <div class="block">
          <div class="kicker">Morgen</div>
          <div class="text">${morgen}</div>
        </div>

        <div class="stats">
          <div class="stat">
            <small>Readiness</small>
            <b>${score}</b>
          </div>
          <div class="stat">
            <small>Zone</small>
            <b>${zone}</b>
          </div>
          <div class="stat">
            <small>Stappen</small>
            <b>${stappen}</b>
          </div>
          <div class="stat">
            <small>Dagtype</small>
            <b>${dagtype}</b>
          </div>
        </div>

        <div class="block" style="margin-top:12px;">
          <div class="kicker">Weekstatus</div>
          <div class="weekbox">
            <div class="weekrow"><span class="text"><strong>Belasting:</strong> ${week.belasting}</span></div>
            <div class="weekrow"><span class="text"><strong>Trend:</strong> ${week.hersteltrend}</span></div>
            <div class="weekrow"><span class="text"><strong>Gedrag:</strong> ${week.gedrag}</span></div>
            <div class="weekrow"><span class="text"><strong>Actie:</strong> ${week.advies}</span></div>
          </div>
        </div>
      `;
    }
  </script>
</body>
</html>
