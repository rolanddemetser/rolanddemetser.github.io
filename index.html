<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coach RDM</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont;
  background:#f3f4f6;
  color:#111;
}

.wrap{
  max-width:720px;
  margin:auto;
  padding:16px;
}

h1{
  font-size:34px;
  font-weight:900;
  margin:0;
}

.sub{
  color:#6b7280;
  margin:4px 0 18px;
  font-weight:600;
}

.card{
  background:#fff;
  border-radius:18px;
  padding:16px;
  margin-bottom:16px;
}

label{
  font-weight:700;
  display:block;
  margin-top:10px;
}

input,select{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:1px solid #ddd;
  font-size:18px;
  margin-top:4px;
}

.chips{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-top:10px;
}

.chip{
  padding:10px 14px;
  border-radius:999px;
  background:#e5e7eb;
  border:none;
  font-weight:800;
}

.active{
  background:#111;
  color:#fff;
}

.btn{
  width:100%;
  margin-top:14px;
  padding:16px;
  background:#111;
  color:#fff;
  border:none;
  border-radius:14px;
  font-size:20px;
  font-weight:900;
}

.verdict{
  padding:18px;
  border-radius:16px;
  font-size:24px;
  font-weight:900;
}

.good{background:#dff7e6;}
.mid{background:#fff1cc;}
.bad{background:#ffe0e0;}

.action{
  margin-top:12px;
  padding:16px;
  border-radius:16px;
  border:1px solid #e5e7eb;
}

.do{
  font-size:32px;
  font-weight:900;
}

.dont{
  margin-top:10px;
  color:#6b7280;
  font-weight:700;
}

.stats{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:12px;
}

.stat{
  background:#f9fafb;
  padding:12px;
  border-radius:12px;
}

.stat small{
  color:#6b7280;
}

.stat b{
  display:block;
  font-size:22px;
}
</style>
</head>

<body>

<div class="wrap">

<h1>🔥 Coach RDM</h1>
<div class="sub">Ochtend eerst. Jij vult in, de coach beslist.</div>

<div class="card">

<label>Body Battery</label>
<input id="bb" value="63">

<label>Slaapscore</label>
<input id="sleep" value="69">

<label>HRV</label>
<input id="hrv" value="53">

<label>Stress</label>
<input id="stress" value="20">

<label>Gevoel</label>
<select id="gevoel">
<option>slecht</option>
<option selected>ok</option>
<option>goed</option>
</select>

<label>Lichaam</label>
<select id="lichaam">
<option>moe</option>
<option>stijf</option>
<option selected>fris</option>
</select>

<label>Darmen</label>
<select id="darmen">
<option selected>goed</option>
<option>traag</option>
<option>slecht</option>
</select>

<label>Momenten</label>
<div class="chips">
<button class="chip active" onclick="toggle(this)">ochtend</button>
<button class="chip active" onclick="toggle(this)">middag</button>
<button class="chip active" onclick="toggle(this)">avond</button>
</div>

<label>Duur</label>
<div class="chips">
<button class="chip active" onclick="toggle(this)">20</button>
<button class="chip active" onclick="toggle(this)">30</button>
<button class="chip active" onclick="toggle(this)">45</button>
<button class="chip" onclick="toggle(this)">60</button>
</div>

<button class="btn" onclick="run()">Wat vandaag?</button>

</div>

<div class="card" id="result">Nog niets berekend</div>

</div>

<script>

function toggle(el){
  el.classList.toggle("active")
}

function run(){

let bb=+bb.value
let sleep=+sleep.value
let hrv=+hrv.value
let stress=+stress.value

let score = (bb*0.3)+(sleep*0.25)+(hrv*0.25)+((100-stress)*0.2)

if(gevoel.value=="goed") score+=5
if(gevoel.value=="slecht") score-=10

if(lichaam.value=="moe") score-=10
if(lichaam.value=="stijf") score-=5

if(darmen.value=="slecht") score-=8
if(darmen.value=="traag") score-=4

score=Math.max(0,Math.min(100,Math.round(score)))

let moment = [...document.querySelectorAll('.chip.active')]
.map(x=>x.innerText)

let tijd="ochtend"
if(!moment.includes("ochtend")){
  tijd = moment.includes("middag") ? "middag":"avond"
}

let dur=[...document.querySelectorAll('.chip.active')]
.map(x=>x.innerText).filter(x=>!isNaN(x))

let d=dur.map(Number).sort((a,b)=>a-b)

let duur=20

if(score>75 && d.includes(45)) duur=45
else if(score>60 && d.includes(30)) duur=30
else duur=d[0]

let verdict=""
let kleur="mid"

if(score<50){
  verdict="STOP. Herstel."
  kleur="bad"
}
else if(score<65){
  verdict="Rustig bewegen."
}
else if(score<75){
  verdict="Train gecontroleerd."
}
else{
  verdict="Go."
  kleur="good"
}

let actie=`${duur} min zone 2 (${tijd})`
let dont="niet tot uitputting"

if(score<50){
  actie="wandelen of rust"
  dont="geen training"
}

document.getElementById("result").innerHTML=`
<div class="verdict ${kleur}">${verdict}</div>

<div class="action">
<div class="do">${actie}</div>
<div class="dont">${dont}</div>
</div>

<div class="stats">
<div class="stat"><small>Readiness</small><b>${score}</b></div>
<div class="stat"><small>Moment</small><b>${tijd}</b></div>
</div>
`

}

</script>

</body>
</html>
