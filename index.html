<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#f3f4f6" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>Coach RDM</title>

  <style>
    :root{
      --bg:#f3f4f6;
      --card:#ffffff;
      --text:#111111;
      --muted:#6b7280;
      --line:#e5e7eb;

      --chip:#ececec;
      --chip-on:#111111;
      --chip-on-text:#ffffff;

      --good:#dff7e6;
      --warn:#fff1cc;
      --bad:#ffe0e0;

      --shadow:0 8px 20px rgba(0,0,0,0.05);
      --radius:18px;
    }

    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .wrap{
      max-width:860px;
      margin:0 auto;
      padding:18px 16px 40px;
    }

    h1{
      margin:0 0 6px;
      font-size:34px;
      line-height:1.05;
      font-weight:900;
      letter-spacing:-0.6px;
    }

    .subtitle{
      margin:0 0 18px;
      color:var(--muted);
      font-size:17px;
      line-height:1.35;
      font-weight:650;
    }

    .card{
      background:var(--card);
      border-radius:var(--radius);
      padding:18px;
      margin-bottom:16px;
      box-shadow:var(--shadow);
    }

    .section-title{
      margin:0 0 12px;
      font-size:20px;
      font-weight:850;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr;
      gap:12px;
    }

    @media (min-width:720px){
      .grid.two{
        grid-template-columns:1fr 1fr;
      }
    }

    label{
      display:block;
      margin:0 0 6px;
      font-size:16px;
      font-weight:760;
    }

    input, select{
      width:100%;
      padding:14px 14px;
      border-radius:14px;
      border:1px solid #d1d5db;
      background:#fff;
      color:#111;
      font-size:18px;
      appearance:none;
      -webkit-appearance:none;
    }

    .divider{
      height:1px;
      background:var(--line);
      margin:14px 0;
    }

    .chips{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:6px;
    }

    .chip{
      border:none;
      background:var(--chip);
      color:#111;
      padding:12px 16px;
      border-radius:999px;
      font-size:17px;
      font-weight:800;
      cursor:pointer;
      min-width:92px;
      text-align:center;
    }

    .chip.active{
      background:var(--chip-on);
      color:var(--chip-on-text);
    }

    .btn{
      width:100%;
      border:none;
      border-radius:16px;
      padding:18px 18px;
      background:#111111;
      color:#ffffff;
      font-size:20px;
      font-weight:850;
      cursor:pointer;
      margin-top:8px;
    }

    .result-shell{
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    .decision{
      border-radius:18px;
      padding:18px;
      font-size:28px;
      line-height:1.2;
      font-weight:900;
    }

    .decision.good{ background:var(--good); }
    .decision.warn{ background:var(--warn); }
    .decision.bad{ background:var(--bad); }

    .action-card{
      border:1px solid var(--line);
      border-radius:18px;
      padding:18px;
      background:#fff;
    }

    .action-label{
      font-size:14px;
      color:var(--muted);
      font-weight:900;
      letter-spacing:0.5px;
      margin-bottom:8px;
      text-transform:uppercase;
    }

    .action-main{
      font-size:34px;
      line-height:1.12;
      font-weight:900;
      margin-bottom:14px;
    }

    .action-sub{
      font-size:18px;
      line-height:1.4;
      color:var(--muted);
      font-weight:700;
    }

    .stats{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      opacity:0.88;
    }

    @media (min-width:720px){
      .stats{
        grid-template-columns:repeat(4,1fr);
      }
    }

    .stat{
      background:#f8f9fb;
      border:1px solid var(--line);
      border-radius:16px;
      padding:14px;
    }

    .stat-k{
      font-size:13px;
      color:var(--muted);
      font-weight:750;
      margin-bottom:6px;
    }

    .stat-v{
      font-size:28px;
      line-height:1;
      font-weight:900;
    }

    .mini{
      font-size:17px;
      line-height:1.35;
      font-weight:800;
    }

    .input-note{
      margin-top:8px;
      color:var(--muted);
      font-size:14px;
      line-height:1.4;
      font-weight:650;
    }

    .empty{
      color:var(--muted);
      font-size:18px;
      font-weight:700;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>🔥 Coach RDM</h1>
    <div class="subtitle">Ochtend eerst. Jij vult in, de coach beslist.</div>

    <div class="card">
      <div class="section-title">Garmin</div>
      <div class="grid two">
        <div>
          <label for="bb">Body Battery</label>
          <input id="bb" type="number" min="0" max="100" value="63" />
        </div>
        <div>
          <label for="sleep">Slaapscore</label>
          <input id="sleep" type="number" min="0" max="100" value="69" />
        </div>
        <div>
          <label for="hrv">HRV (ochtendsnapshot)</label>
          <input id="hrv" type="number" min="0" max="120" value="53" />
        </div>
        <div>
          <label for="stress">Stress</label>
          <input id="stress" type="number" min="0" max="100" value="20" />
        </div>
      </div>

      <div class="divider"></div>

      <div class="section-title">Check-in</div>
      <div class="grid two">
        <div>
          <label for="gevoel">Gevoel</label>
          <select id="gevoel">
            <option value="slecht">slecht</option>
            <option value="ok" selected>ok</option>
            <option value="goed">goed</option>
          </select>
        </div>

        <div>
          <label for="lichaam">Lichaam</label>
          <select id="lichaam">
            <option value="moe">moe</option>
            <option value="stijf">stijf</option>
            <option value="fris" selected>fris</option>
          </select>
        </div>

        <div>
          <label for="darmen">Darmen</label>
          <select id="darmen">
            <option value="goed" selected>goed</option>
            <option value="traag">traag</option>
            <option value="slecht">slecht</option>
          </select>
        </div>
      </div>

      <div class="divider"></div>

      <div class="section-title">Momenten die vandaag mogelijk zijn</div>
      <div class="chips">
        <button class="chip active" type="button" data-group="moment" data-value="ochtend">ochtend</button>
        <button class="chip active" type="button" data-group="moment" data-value="middag">middag</button>
        <button class="chip active" type="button" data-group="moment" data-value="avond">avond</button>
      </div>
      <div class="input-note">Ochtend krijgt altijd voorrang als die mogelijk is.</div>

      <div class="divider"></div>

      <div class="section-title">Duur die vandaag mogelijk is</div>
      <div class="chips">
        <button class="chip active" type="button" data-group="duur" data-value="20">20</button>
        <button class="chip active" type="button" data-group="duur" data-value="30">30</button>
        <button class="chip active" type="button" data-group="duur" data-value="45">45</button>
        <button class="chip" type="button" data-group="duur" data-value="60">60</button>
      </div>

      <button class="btn" onclick="bereken()">Wat vandaag?</button>
    </div>

    <div class="card">
      <div id="result" class="empty">Nog niets berekend.</div>
    </div>
  </div>

  <script>
    document.querySelectorAll('.chip').forEach(chip => {
      chip.addEventListener('click', () => chip.classList.toggle('active'));
    });

    function clamp(x, min, max){
      return Math.max(min, Math.min(max, x));
    }

    function getSelected(group){
      return [...document.querySelectorAll(`.chip[data-group="${group}"].active`)]
        .map(el => el.dataset.value);
    }

    function hrvToScore(hrv){
      if(hrv >= 75) return 92;
      if(hrv >= 65) return 84;
      if(hrv >= 55) return 76;
      if(hrv >= 45) return 66;
      if(hrv >= 35) return 52;
      return 38;
    }

    function chooseMoment(available){
      if(available.includes("ochtend")) return "ochtend";
      if(available.includes("middag")) return "middag";
      if(available.includes("avond")) return "avond";
      return "ochtend";
    }

    function chooseDuration(available, readiness, moment, darmen, lichaam){
      const nums = available.map(Number).sort((a,b) => a-b);
      if(nums.length === 0) return 20;

      // darmproblemen: kort houden
      if(darmen === "slecht"){
        if(nums.includes(20)) return 20;
        if(nums.includes(30)) return 30;
        return nums[0];
      }

      // moe of stijf: niet te lang
      if(lichaam === "moe"){
        if(nums.includes(20)) return 20;
        if(nums.includes(30)) return 30;
        return nums[0];
      }

      // avond: duidelijk afremmen
      if(moment === "avond"){
        if(readiness < 75){
          if(nums.includes(20)) return 20;
          if(nums.includes(30)) return 30;
          return nums[0];
        }
        if(nums.includes(30)) return 30;
        if(nums.includes(45)) return 45;
        if(nums.includes(20)) return 20;
        return nums[0];
      }

      // ochtend: standaard voorkeur
      if(moment === "ochtend"){
        if(readiness < 50){
          if(nums.includes(20)) return 20;
          return nums[0];
        }
        if(readiness < 62){
          if(nums.includes(20)) return 20;
          if(nums.includes(30)) return 30;
          return nums[0];
        }
        if(readiness < 74){
          if(nums.includes(30)) return 30;
          if(nums.includes(45)) return 45;
          if(nums.includes(20)) return 20;
          return nums[0];
        }
        if(nums.includes(45)) return 45;
        if(nums.includes(30)) return 30;
        if(nums.includes(60)) return 60;
        if(nums.includes(20)) return 20;
        return nums[0];
      }

      // middag
      if(readiness < 50){
        if(nums.includes(20)) return 20;
        return nums[0];
      }
      if(readiness < 62){
        if(nums.includes(30)) return 30;
        if(nums.includes(20)) return 20;
        return nums[0];
      }
      if(readiness < 74){
        if(nums.includes(45)) return 45;
        if(nums.includes(30)) return 30;
        if(nums.includes(20)) return 20;
        return nums[0];
      }
      if(nums.includes(45)) return 45;
      if(nums.includes(60)) return 60;
      if(nums.includes(30)) return 30;
      if(nums.includes(20)) return 20;
      return nums[0];
    }

    function calculateReadiness(bb, sleep, hrv, stress, gevoel, lichaam, darmen){
      let readiness = Math.round(
        (bb * 0.30) +
        (sleep * 0.25) +
        (hrvToScore(hrv) * 0.25) +
        ((100 - stress) * 0.20)
      );

      if(gevoel === "goed") readiness += 5;
      if(gevoel === "slecht") readiness -= 10;

      if(lichaam === "fris") readiness += 3;
      if(lichaam === "stijf") readiness -= 5;
      if(lichaam === "moe") readiness -= 10;

      if(darmen === "traag") readiness -= 4;
      if(darmen === "slecht") readiness -= 8;

      return clamp(readiness, 0, 100);
    }

    function getPlan(readiness, moment, duur, stress, hrv, sleep, lichaam, darmen){
      let dagtype = "";
      let verdict = "";
      let doen = "";
      let nietDoen = "";
      let stappen = "";

      if(readiness < 50){
        dagtype = "🔴 Stop";
        verdict = "Herstel. Niet trainen.";
        doen = `${duur} min rustig wandelen (${moment}) of volledige rust`;
        nietDoen = "geen training";
        stappen = "5000–6500";
      }
      else if(readiness < 62){
        dagtype = "🟠 Herstel";
        verdict = "Bewegen ok. Training niet.";
        doen = `${duur} min rustig bewegen (${moment})`;
        nietDoen = "geen intensiteit";
        stappen = "6500–8000";
      }
      else if(readiness < 74){
        dagtype = "🟢 Licht actief";
        verdict = "Train, maar gecontroleerd.";
        doen = `${duur} min zone 2 (${moment})`;
        nietDoen = "niet tot uitputting";
        stappen = "7500–9000";
      }
      else{
        dagtype = "🔵 Train";
        verdict = "Groen licht.";
        doen = `${duur} min training (${moment})`;
        nietDoen = "niet overdrijven";
        stappen = "9000–11000";
      }

      if(stress > 40){
        verdict += " Stress hoog.";
      } else if(stress <= 20 && readiness >= 62 && readiness < 74){
        verdict += " Stress laag.";
      }

      if(hrv < 40){
        verdict += " HRV laag.";
      }

      if(sleep < 60){
        verdict += " Slaap remt af.";
      }

      if(lichaam === "stijf"){
        doen += " + 5 min mobiliteit";
      }

      if(darmen === "traag"){
        doen += " met vlotte cadans";
      }

      if(darmen === "slecht"){
        verdict += " Hou het simpel.";
      }

      return { dagtype, verdict, doen, nietDoen, stappen };
    }

    function getBandClass(readiness){
      if(readiness >= 75) return "good";
      if(readiness >= 60) return "warn";
      return "bad";
    }

    function bereken(){
      const bb = clamp(Number(document.getElementById("bb").value), 0, 100);
      const sleep = clamp(Number(document.getElementById("sleep").value), 0, 100);
      const hrv = clamp(Number(document.getElementById("hrv").value), 0, 120);
      const stress = clamp(Number(document.getElementById("stress").value), 0, 100);

      const gevoel = document.getElementById("gevoel").value;
      const lichaam = document.getElementById("lichaam").value;
      const darmen = document.getElementById("darmen").value;

      let moments = getSelected("moment");
      let durations = getSelected("duur");

      if(moments.length === 0) moments = ["ochtend","middag","avond"];
      if(durations.length === 0) durations = ["20","30"];

      const readiness = calculateReadiness(bb, sleep, hrv, stress, gevoel, lichaam, darmen);
      const moment = chooseMoment(moments);
      const duur = chooseDuration(durations, readiness, moment, darmen, lichaam);
      const plan = getPlan(readiness, moment, duur, stress, hrv, sleep, lichaam, darmen);
      const bandClass = getBandClass(readiness);

      document.getElementById("result").innerHTML = `
        <div class="result-shell">
          <div class="decision ${bandClass}">
            ${plan.verdict}
          </div>

          <div class="action-card">
            <div class="action-label">Doen</div>
            <div class="action-main">${plan.doen}</div>
            <div class="action-label">Niet doen</div>
            <div class="action-sub">${plan.nietDoen}</div>
          </div>

          <div class="stats">
            <div class="stat">
              <div class="stat-k">Readiness</div>
              <div class="stat-v">${readiness}</div>
            </div>
            <div class="stat">
              <div class="stat-k">Dagtype</div>
              <div class="stat-v mini">${plan.dagtype}</div>
            </div>
            <div class="stat">
              <div class="stat-k">Moment</div>
              <div class="stat-v mini">${moment}</div>
            </div>
            <div class="stat">
              <div class="stat-k">Stappen</div>
              <div class="stat-v mini">${plan.stappen}</div>
            </div>
          </div>
        </div>
      `;
    }
  </script>
</body>
</html>
