<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ochtendcoach</title>

<style>
body {font-family: -apple-system; padding:20px;}
input, select, button {width:100%; padding:15px; margin:10px 0; font-size:18px;}
button {background:black; color:white; border-radius:10px;}
#result {margin-top:20px; padding:15px; border-radius:10px; font-size:18px;}
</style>
</head>

<body>

<h2>Ochtendcoach 🔥</h2>

<input id="bb" placeholder="Body Battery (vb 75)">
<input id="sleep" placeholder="Slaapscore (vb 80)">

<select id="gevoel">
  <option value="goed">Goed</option>
  <option value="matig">Matig</option>
  <option value="slecht">Slecht</option>
</select>

<button onclick="advies()">Wat vandaag?</button>

<div id="result"></div>

<script>
function advies(){
  let bb = parseInt(document.getElementById("bb").value);
  let sleep = parseInt(document.getElementById("sleep").value);
  let gevoel = document.getElementById("gevoel").value;

  let advies = "";
  let kleur = "";

  if(bb >= 80 && sleep >= 80){
    advies = "🔥 TOPDAG → HASfit + vetverbranding";
    kleur = "#c8f7c5";
  }
  else if(bb >= 60){
    advies = "🚶 Zone 2 wandeling → vetverbranding";
    kleur = "#e7f7c5";
  }
  else if(bb >= 40){
    advies = "🧘 Yoga + lichte beweging";
    kleur = "#fff3cd";
  }
  else{
    advies = "🛌 Rustdag → herstel = progressie";
    kleur = "#f8d7da";
  }

  if(gevoel === "slecht"){
    advies = "⚠️ Luister naar je lichaam → rust of zeer licht";
    kleur = "#f8d7da";
  }

  document.getElementById("result").innerHTML = advies;
  document.getElementById("result").style.background = kleur;
}
</script>

</body>
</html>
