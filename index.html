<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Weekcoach PRO</title>

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Weekcoach">
  <meta name="theme-color" content="#f3f4f6">

  <style>
    :root {
      --bg: #f3f4f6;
      --text: #111111;
      --muted: #5f5f5f;
      --border: #d2d6dc;
      --card: #ffffff;
      --green: #dcfce7;
      --yellow: #fef3c7;
      --orange: #ffedd5;
      --red: #fee2e2;
      --dark: #111111;
      --secondary: #6b7280;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      padding: env(safe-area-inset-top) 18px env(safe-area-inset-bottom) 18px;
    }

    .app {
      max-width: 760px;
      margin: 0 auto;
      padding: 18px 0 28px 0;
    }

    h1 {
      margin: 0 0 6px 0;
      font-size: 34px;
      line-height: 1.04;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .sub {
      margin: 0 0 18px 0;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.35;
    }

    .panel {
      background: rgba(255,255,255,0.32);
      border-radius: 20px;
      padding: 2px;
    }

    input, select, button {
      width: 100%;
      padding: 16px;
      margin-top: 12px;
      font-size: 21px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      appearance: none;
      -webkit-appearance: none;
    }

    button {
      border: none;
      background: var(--dark);
      color: white;
      font-weight: 800;
    }

    .row {
      display: flex;
      gap: 10px;
      margin-top: 12px;
    }

    .row button {
      margin-top: 0;
      font-size: 18px;
      padding: 14px;
    }

    .secondary {
      background: var(--secondary);
    }

    .card {
      display: none;
      margin-top: 20px;
      padding: 18px;
      border-radius: 20px;
      line-height: 1.45;
      background: var(--card);
    }

    .green { background: var(--green); }
    .yellow { background: var(--yellow); }
    .orange { background: var(--orange); }
    .red { background: var(--red); }

    .title {
      font-size: 30px;
      font-weight: 800;
      line-height: 1.08;
      margin-bottom: 10px;
    }

    .box {
      margin-top: 12px;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(255,255,255,0.60);
      font-size: 20px;
      font-weight: 800;
    }

    .line {
      margin-top: 8px;
      font-size: 19px;
    }

    .small {
      margin-top: 10px;
      font-size: 17px;
      color: #404040;
      line-height: 1.35;
    }

    .warn {
      margin-top: 12px;
      font-size: 18px;
      font-weight: 800;
      color: #991b1b;
      line-height: 1.35;
    }

    .ok {
      color: #166534;
    }

    .footer {
      margin-top: 18px;
      text-align: center;
      color: #666;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>Weekcoach PRO 🔥</h1>
    <p class="sub">Persoonlijke coach voor vetverbranding, herstel en weekbelasting.</p>

    <div class="panel">
      <input id="bb" type="number" inputmode="numeric" placeholder="Body Battery (bv 75)">
      <input id="sleep" type="number" inputmode="numeric" placeholder="Slaapscore (bv 80)">

      <select id="gevoel">
        <option value="goed">Gevoel: goed</option>
        <option value="matig">Gevoel: matig</option>
        <option value="slecht">Gevoel: slecht</option>
      </select>

      <select id="lichaam">
        <option value="fris">Lichaam: fris</option>
        <option value="stram">Lichaam: stram</option>
        <option value="moe">Lichaam: moe / stijf</option>
      </select>

      <select id="weer">
        <option value="droog">Weer: droog</option>
        <option value="regen">Weer: regen</option>
      </select>

      <select id="possible">
        <option value="am">Possible: AM</option>
        <option value="pm">Possible: PM</option>
        <option value="evening">Possible: Evening</option>
        <option value="all">Possible: All day</option>
      </select>

      <button onclick="coach()">Wat vandaag?</button>

      <div class="row">
        <button class="secondary" onclick="toonWeek()">Toon weekstatus</button>
        <button class="secondary" onclick="resetWeek()">Reset week</button>
      </div>
    </div>

    <div id="result" class="card"></div>

    <div class="footer">Zone 2-focus: ongeveer 95–110 bpm</div>
  </div>

  <script>
    const STORAGE_KEY = "weekcoach_pro_v2";

    function average(arr) {
      if (!arr.length) return 0;
      return arr.reduce((a, b) => a + b, 0) / arr.length;
    }

    function stddev(arr) {
      if (arr.length < 2) return 0;
      const avg = average(arr);
      const variance = average(arr.map(x => Math.pow(x - avg, 2)));
      return Math.sqrt(variance);
    }

    function monotony(arr) {
      const avg = average(arr);
      const sd = stddev(arr);
      if (sd === 0) return avg > 0 ? 99 : 0;
      return avg / sd;
    }

    function todayKey() {
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${y}-${m}-${day}`;
    }

    function getWeekData() {
      return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
    }

    function saveWeekData(data) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function saveTodayLoad(load) {
      const key = todayKey();
      let week = getWeekData();

      week = week.filter(item => item.date !== key);
      week.push({ date: key, load });

      week.sort((a, b) => a.date.localeCompare(b.date));
      if (week.length > 7) {
        week = week.slice(-7);
      }

      saveWeekData(week);
      return week;
    }

    function dayScore(bb, sleep, gevoel, lichaam) {
      let score = 0;

      if (bb >= 80) score += 3;
      else if (bb >= 70) score += 2;
      else if (bb >= 60) score += 1;

      if (sleep >= 80) score += 3;
      else if (sleep >= 70) score += 2;
      else if (sleep >= 60) score += 1;

      if (gevoel === "goed") score += 2;
      else if (gevoel === "matig") score += 1;

      if (lichaam === "fris") score += 2;
      else if (lichaam === "stram") score += 1;

      return score;
    }

    function timingText(possible) {
      if (possible === "am") return "Voormiddag: hou het compact en gecontroleerd.";
      if (possible === "pm") return "Namiddag: goed moment voor een gerichte sessie.";
      if (possible === "evening") return "Avond: liever geen zware of te lange prikkel.";
      return "All day: kies het moment waarop je je het best voelt.";
    }

    function coach() {
      const bb = +document.getElementById("bb").value;
      const sleep = +document.getElementById("sleep").value;
      const gevoel = document.getElementById("gevoel").value;
      const lichaam = document.getElementById("lichaam").value;
      const weer = document.getElementById("weer").value;
      const possible = document.getElementById("possible").value;
      const result = document.getElementById("result");

      result.style.display = "block";
      result.className = "card";

      if (!bb || !sleep) {
        result.innerHTML = `
          <div class="title">Nog niet volledig</div>
          <div class="line">Vul eerst Body Battery en slaapscore in.</div>
        `;
        return;
      }

      const score = dayScore(bb, sleep, gevoel, lichaam);
      const huidigeWeek = getWeekData();
      const oudeLoads = huidigeWeek.map(x => x.load);
      const avgBefore = average(oudeLoads);
      const monoBefore = monotony(oudeLoads);

      let titel = "";
      let dagBesluit = "";
      let weekBesluit = "";
      let advies = "";
      let duur = "";
      let stappen = "";
      let hartslag = "";
      let waarschuwing = "";
      let kleur = "";

      // HARD STOP
      if (gevoel === "slecht" || lichaam === "moe" || bb < 45 || sleep < 55 || score <= 4) {
        titel = "🔴 HERSTEL VERPLICHT";
        dagBesluit = "Vandaag geen training.";
        weekBesluit = "Je lichaam krijgt voorrang op je planning.";
        advies = weer === "regen"
          ? "Zachte yoga of heel rustige korte gewone wandeling. Geen strand."
          : "Rustige wandeling of zachte yoga.";
        duur = "20–30 min max.";
        stappen = "6000–7000";
        hartslag = "Liefst onder zone 2.";
        waarschuwing = "Niet uitbreiden. Geen HASfit.";
        kleur = "red";
      }

      // WEEKREM
      else if (oudeLoads.length >= 3 && avgBefore > 6.0) {
        titel = "🔴 WEEKREM";
        dagBesluit = "Vandaag bewust afremmen.";
        weekBesluit = "Je weekbelasting zit te hoog.";
        advies = weer === "regen"
          ? "Korte gewone rustige wandeling of yoga. Geen strand."
          : "Korte rustige wandeling of yoga.";
        duur = "20–30 min.";
        stappen = "6500–7500";
        hartslag = "Laag en rustig.";
        waarschuwing = "Vandaag herstel, ook als je je goed voelt.";
        kleur = "red";
      }

      // MONOTONY REM
      else if (oudeLoads.length >= 4 && monoBefore > 2.2) {
        titel = "🟠 AFREMDAG";
        dagBesluit = "Vandaag lichter dan je misschien zou willen.";
        weekBesluit = "Je weekpatroon wordt te eenvormig.";
        advies = weer === "regen"
          ? "Gewone rustige wandeling. Geen strandwandeling."
          : "Rustige zone 2-wandeling zonder extra tempo.";
        duur = possible === "evening" ? "25–30 min." : "30–40 min.";
        stappen = "7500–8500";
        hartslag = "95–102 bpm.";
        waarschuwing = "Simpel houden. Geen krachttraining.";
        kleur = "orange";
      }

      // LICHTE DAG
      else if (score <= 6) {
        titel = "🟠 LICHTE DAG";
        dagBesluit = "Vandaag bewegen, niet pushen.";
        weekBesluit = "Week technisch onder controle.";
        advies = weer === "regen"
          ? "Gewone rustige wandeling of binnenwandeling."
          : "Rustige wandeling in lage zone 2.";
        duur = possible === "evening" ? "25–30 min." : "30–40 min.";
        stappen = "7500–8500";
        hartslag = "95–105 bpm.";
        waarschuwing = "Geen krachttraining. Niet uitbreiden.";
        kleur = "orange";
      }

      // VETVERBRANDINGSDAG
      else if (score <= 8) {
        titel = "🟡 VETVERBRANDING";
        dagBesluit = "Vandaag is wandelen de beste keuze.";
        weekBesluit = "Goede dag om volume te maken zonder overbelasting.";
        advies = weer === "regen"
          ? "Stevige gewone wandeling. Geen strand."
          : "Stevige strandwandeling in zone 2.";
        duur = possible === "am"
          ? "35–45 min."
          : possible === "evening"
            ? "35–45 min."
            : "45–60 min.";
        stappen = "9000–10000";
        hartslag = "95–105 bpm, liever niet boven 110.";
        waarschuwing = "Vandaag liever wandelen dan zware HASfit.";
        kleur = "yellow";
      }

      // STERKE DAG
      else {
        titel = "🟢 STERKE DAG";
        dagBesluit = "Vandaag kan je combineren, maar beheerst.";
        weekBesluit = "Je dagscore laat meer toe, zolang je kort blijft in kracht.";
        advies = weer === "regen"
          ? "Gewone stevige wandeling + eventueel korte HASfit."
          : "Strandwandeling met tempo + eventueel korte HASfit.";
        duur = possible === "evening"
          ? "35–45 min wandelen + eventueel heel korte kracht."
          : "45–60 min wandelen + korte kracht.";
        stappen = "10000+";
        hartslag = "Wandelen in zone 2, kracht kort en beheerst.";
        waarschuwing = "Goede dag, maar nog altijd: niet onnodig uitbreiden.";
        kleur = "green";
      }

      const nieuweWeek = saveTodayLoad(score);
      const newLoads = nieuweWeek.map(x => x.load);
      const avgAfter = average(newLoads).toFixed(1);
      const monoAfter = monotony(newLoads).toFixed(1);

      result.classList.add(kleur);
      result.innerHTML = `
        <div class="title">${titel}</div>
        <div class="box">Trainingsscore vandaag: ${score}/10</div>
        <div class="box">Stappendoel: ${stappen} stappen</div>
        <div class="line"><strong>Dagbesluit:</strong> ${dagBesluit}</div>
        <div class="line"><strong>Weekcoach:</strong> ${weekBesluit}</div>
        <div class="line"><strong>Vandaag:</strong> ${advies}</div>
        <div class="line"><strong>Duur:</strong> ${duur}</div>
        <div class="line"><strong>Hartslag:</strong> ${hartslag}</div>
        <div class="line"><strong>Possible:</strong> ${timingText(possible)}</div>
        <div class="line"><strong>Weekstatus:</strong> gemiddelde load ${avgAfter} / monotony ${monoAfter}</div>
        <div class="warn">${waarschuwing}</div>
      `;
    }

    function toonWeek() {
      const result = document.getElementById("result");
      const week = getWeekData();

      result.style.display = "block";
      result.className = "card yellow";

      if (!week.length) {
        result.innerHTML = `
          <div class="title">Nog geen weekdata</div>
          <div class="line">Gebruik de coach een paar dagen en de weekstatus komt hier automatisch.</div>
        `;
        return;
      }

      const loads = week.map(x => x.load);
      const gem = average(loads).toFixed(1);
      const mon = monotony(loads).toFixed(1);
      const totaal = loads.reduce((a, b) => a + b, 0);

      let status = "Stabiel";
      if (+gem > 6) status = "Hoog";
      if (+mon > 2.2) status = "Te eenvormig";

      result.innerHTML = `
        <div class="title">Weekstatus</div>
        <div class="box">Totale weekload: ${totaal}</div>
        <div class="line"><strong>Dagen bewaard:</strong> ${week.length}</div>
        <div class="line"><strong>Gemiddelde load:</strong> ${gem}</div>
        <div class="line"><strong>Monotony:</strong> ${mon}</div>
        <div class="warn">Status: ${status}</div>
      `;
    }

    function resetWeek() {
      localStorage.removeItem(STORAGE_KEY);
      const result = document.getElementById("result");
      result.style.display = "block";
      result.className = "card orange";
      result.innerHTML = `
        <div class="title">Week gereset</div>
        <div class="line">De opgeslagen weekbelasting is gewist.</div>
      `;
    }
  </script>
</body>
</html>
