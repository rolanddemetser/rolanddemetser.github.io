<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ochtendcoach Niveau 2</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f3f4f6;
      color: #111;
      margin: 0;
      padding: 20px;
    }

    h1 {
      font-size: 34px;
      margin: 0 0 8px 0;
    }

    p.sub {
      margin: 0 0 18px 0;
      color: #555;
      font-size: 18px;
      line-height: 1.4;
    }

    input, select, button {
      width: 100%;
      box-sizing: border-box;
      padding: 16px;
      margin-top: 12px;
      font-size: 22px;
      border-radius: 14px;
      border: 1px solid #ccc;
      background: white;
    }

    button {
      background: #111;
      color: white;
      font-weight: 700;
      border: none;
    }

    .card {
      margin-top: 20px;
      padding: 18px;
      border-radius: 16px;
      background: white;
      line-height: 1.45;
      display: none;
    }

    .green { background: #dcfce7; }
    .yellow { background: #fef3c7; }
    .orange { background: #ffedd5; }
    .red { background: #fee2e2; }

    .title {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .line {
      font-size: 19px;
      margin-top: 6px;
    }

    .small {
      font-size: 17px;
      color: #444;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <h1>Ochtendcoach 🔥</h1>
  <p class="sub">Definitieve versie met focus op vetverbranding, herstel en realistisch trainen.</p>

  <input id="bb" type="number" placeholder="Body Battery (bv 75)">
  <input id="sleep" type="number" placeholder="Slaapscore (bv 80)">

  <select id="gevoel">
    <option value="goed">Gevoel: goed</option>
    <option value="matig">Gevoel: matig</option>
    <option value="slecht">Gevoel: slecht</option>
  </select>

  <select id="lichaam">
    <option value="fris">Lichaam: fris</option>
    <option value="stram">Lichaam: wat stram</option>
    <option value="moe">Lichaam: moe / stijf</option>
  </select>

  <button onclick="coach()">Wat vandaag?</button>

  <div id="result" class="card"></div>

  <script>
    function coach() {
      const bb = parseInt(document.getElementById("bb").value);
      const sleep = parseInt(document.getElementById("sleep").value);
      const gevoel = document.getElementById("gevoel").value;
      const lichaam = document.getElementById("lichaam").value;
      const result = document.getElementById("result");

      result.style.display = "block";
      result.className = "card";

      if (isNaN(bb) || isNaN(sleep)) {
        result.innerHTML = `
          <div class="title">Nog niet volledig</div>
          <div class="line">Vul eerst Body Battery en slaapscore in.</div>
        `;
        return;
      }

      let score = 0;

      if (bb >= 80) score += 3;
      else if (bb >= 70) score += 2;
      else if (bb >= 60) score += 1;

      if (sleep >= 80) score += 3;
      else if (sleep >= 70) score += 2;
      else if (sleep >= 60) score += 1;

      if (gevoel === "goed") score += 2;
      else if (gevoel === "matig") score += 1;

      if (lichaam === "fris") score += 2;
      else if (lichaam === "stram") score += 1;

      let titel = "";
      let advies = "";
      let duur = "";
      let stappen = "";
      let hartslag = "";
      let extra = "";
      let kleur = "";

      if (gevoel === "slecht" || lichaam === "moe" || bb < 45 || sleep < 55) {
        titel = "🔴 Hersteldag";
        advies = "Rustige wandeling en/of zachte yoga.";
        duur = "20–30 min rustig bewegen.";
        stappen = "Doel: 6000–7000 stappen.";
        hartslag = "Hou wandelen rustig, liefst onder zone 2.";
        extra = "Geen HASfit. Vandaag herstel boven alles.";
        kleur = "red";
      }
      else if (score <= 5) {
        titel = "🟠 Voorzichtige dag";
        advies = "Zone 2-wandeling, zonder krachttraining.";
        duur = "30–40 min wandelen.";
        stappen = "Doel: 7500–8500 stappen.";
        hartslag = "Doelhartslag: ongeveer 95–105 bpm.";
        extra = "Goed voor vetverbranding zonder extra stress.";
        kleur = "orange";
      }
      else if (score <= 8) {
        titel = "🟡 Goede vetverbrandingsdag";
        advies = "Stevige zone 2-wandeling.";
        duur = "45–60 min wandelen.";
        stappen = "Doel: 9000–10000 stappen.";
        hartslag = "Doelhartslag: ongeveer 95–105 bpm, liever niet boven 110.";
        extra = "Vandaag liever wandelen dan zware HASfit.";
        kleur = "yellow";
      }
      else {
        titel = "🟢 Sterke dag";
        advies = "Zone 2-wandeling + eventueel korte HASfit.";
        duur = "45–60 min wandelen + korte krachtprikkel.";
        stappen = "Doel: 10000+ stappen.";
        hartslag = "Wandelen vooral in zone 2, kracht kort en beheerst.";
        extra = "Goede dag om vetverbranding en training te combineren.";
        kleur = "green";
      }

      result.classList.add(kleur);
      result.innerHTML = `
        <div class="title">${titel}</div>
        <div class="line"><strong>Vandaag:</strong> ${advies}</div>
        <div class="line"><strong>Duur:</strong> ${duur}</div>
        <div class="line"><strong>Stappen:</strong> ${stappen}</div>
        <div class="line"><strong>Hartslag:</strong> ${hartslag}</div>
        <div class="small">${extra}</div>
      `;
    }
  </script>

</body>
</html>
