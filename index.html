<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#f3f4f6">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Pro coach RDM – Level 2</title>

<style>
  :root{
    --bg:#f3f4f6;
    --card:#ffffff;
    --text:#111111;
    --muted:#6b7280;
    --line:#e5e7eb;
    --good:#dff7e6;
    --warn:#fff1cc;
    --bad:#ffe0e0;
    --info:#e8f1ff;
    --shadow:0 8px 20px rgba(0,0,0,0.05);
    --radius:18px;
  }

  *{box-sizing:border-box}

  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
    background:var(--bg);
    color:var(--text);
  }

  .wrap{
    max-width:760px;
    margin:0 auto;
    padding:16px 16px 40px;
  }

  h1{
    margin:0 0 6px;
    font-size:34px;
    line-height:1.05;
    font-weight:900;
    letter-spacing:-0.6px;
  }

  .sub{
    color:var(--muted);
    margin:0 0 18px;
    font-weight:650;
    font-size:17px;
    line-height:1.35;
  }

  .card{
    background:var(--card);
    padding:16px;
    border-radius:var(--radius);
    margin-bottom:16px;
    box-shadow:var(--shadow);
  }

  .section-title{
    font-size:19px;
    font-weight:850;
    margin:0 0 12px;
  }

  .grid{
    display:grid;
    grid-template-columns:1fr;
    gap:12px;
  }

  @media (min-width:700px){
    .grid.two{
      grid-template-columns:1fr 1fr;
    }
  }

  label{
    display:block;
    font-weight:760;
    margin:0 0 6px;
    font-size:16px;
  }

  input,select{
    width:100%;
    padding:14px;
    border-radius:14px;
    border:1px solid #d1d5db;
    background:#fff;
    font-size:18px;
    color:#111;
    appearance:none;
    -webkit-appearance:none;
  }

  button{
    width:100%;
    margin-top:14px;
    padding:17px;
    background:#111;
    color:#fff;
    border:none;
    border-radius:14px;
    font-size:20px;
    font-weight:900;
    cursor:pointer;
  }

  .divider{
    height:1px;
    background:var(--line);
    margin:14px 0;
  }

  .verdict{
    padding:18px;
    border-radius:16px;
    font-size:24px;
    line-height:1.15;
    font-weight:900;
  }

  .good{background:var(--good);}
  .mid{background:var(--warn);}
  .bad{background:var(--bad);}
  .info{background:var(--info);}

  .action{
    margin-top:12px;
    padding:16px;
    border-radius:16px;
    border:1px solid var(--line);
  }

  .kicker{
    font-size:13px;
    color:var(--muted);
    font-weight:900;
    text-transform:uppercase;
    letter-spacing:0.5px;
    margin-bottom:6px;
  }

  .do{
    font-size:30px;
    line-height:1.1;
    font-weight:900;
    margin-bottom:12px;
  }

  .text{
    font-size:18px;
    line-height:1.35;
    color:var(--muted);
    font-weight:750;
    margin-bottom:12px;
  }

  .text:last-child{
    margin-bottom:0;
  }

  .stats{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-top:12px;
  }

  @media (min-width:700px){
    .stats{
      grid-template-columns:repeat(4,1fr);
    }
  }

  .stat{
    background:#f9fafb;
    padding:12px;
    border-radius:12px;
    border:1px solid var(--line);
  }

  .stat small{
    color:var(--muted);
    font-weight:750;
    display:block;
    margin-bottom:4px;
  }

  .stat b{
    font-size:22px;
    line-height:1.1;
    display:block;
  }

  .flag{
    margin-top:12px;
    padding:14px;
    border-radius:14px;
    font-size:17px;
    line-height:1.35;
    font-weight:800;
  }

  .empty{
    color:var(--muted);
    font-size:18px;
    font-weight:700;
  }
</style>
</head>

<body>
<div class="wrap">

  <h1>🔥 Pro coach RDM</h1>
  <div class="sub">Level 2. Ochtend eerst. Jij vult in, de coach bewaakt je belasting.</div>

  <div class="card">
    <div class="section-title">Garmin</div>

    <div class="grid two">
      <div>
        <label for="bb">Body Battery</label>
        <input id="bb" type="number" min="0" max="100" value="63">
      </div>

      <div>
        <label for="sleep">Slaapscore</label>
        <input id="sleep" type="number" min="0" max="100" value="69">
      </div>

      <div>
        <label for="hrv">HRV</label>
        <input id="hrv" type="number" min="0" max="120" value="53">
      </div>

      <div>
        <label for="stress">Stress</label>
        <input id="stress" type="number" min="0" max="100" value="20">
      </div>
    </div>

    <div class="divider"></div>

    <div class="section-title">Check-in</div>

    <div class="grid two">
      <div>
        <label for="gevoel">Gevoel</label>
        <select id="gevoel">
          <option value="slecht">slecht</option>
          <option value="ok" selected>ok</option>
          <option value="goed">goed</option>
        </select>
      </div>

      <div>
        <label for="lichaam">Lichaam</label>
        <select id="lichaam">
          <option value="moe">moe</option>
          <option value="stijf">stijf</option>
          <option value="fris" selected>fris</option>
        </select>
      </div>

      <div>
        <label for="darmen">Darmen</label>
        <select id="darmen">
          <option value="goed" selected>goed</option>
          <option value="traag">traag</option>
          <option value="slecht">slecht</option>
        </select>
      </div>
    </div>

    <div class="divider"></div>

    <div class="section-title">Belastingbewaking</div>

    <div class="grid two">
      <div>
        <label for="days">Dagen op rij getraind</label>
        <select id="days">
          <option value="0">0</option>
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3" selected>3</option>
          <option value="4">4+</option>
        </select>
      </div>

      <div>
        <label for="heavy">Gisteren zwaar getraind?</label>
        <select id="heavy">
          <option value="nee" selected>nee</option>
          <option value="ja">ja</option>
        </select>
      </div>
    </div>

    <button onclick="bereken()">Wat vandaag?</button>
  </div>

  <div class="card" id="result">
    <div class="empty">Nog niets berekend</div>
  </div>

</div>

<script>
function clamp(x,min,max){
  return Math.max(min, Math.min(max, x));
}

function hrvToScore(hrv){
  if(hrv >= 75) return 92;
  if(hrv >= 65) return 84;
  if(hrv >= 55) return 76;
  if(hrv >= 45) return 66;
  if(hrv >= 35) return 52;
  return 38;
}

function bereken(){
  const bb = clamp(parseInt(document.getElementById("bb").value) || 0, 0, 100);
  const sleep = clamp(parseInt(document.getElementById("sleep").value) || 0, 0, 100);
  const hrv = clamp(parseInt(document.getElementById("hrv").value) || 0, 0, 120);
  const stress = clamp(parseInt(document.getElementById("stress").value) || 0, 0, 100);

  const gevoel = document.getElementById("gevoel").value;
  const lichaam = document.getElementById("lichaam").value;
  const darmen = document.getElementById("darmen").value;

  const days = document.getElementById("days").value;
  const heavy = document.getElementById("heavy").value;

  let score =
    (bb * 0.30) +
    (sleep * 0.25) +
    (hrvToScore(hrv) * 0.25) +
    ((100 - stress) * 0.20);

  if(gevoel === "goed") score += 5;
  if(gevoel === "slecht") score -= 10;

  if(lichaam === "fris") score += 3;
  if(lichaam === "stijf") score -= 6;
  if(lichaam === "moe") score -= 12;

  if(darmen === "traag") score -= 4;
  if(darmen === "slecht") score -= 8;

  // nieuwe Level 2 weekbewaking
  if(days === "2") score -= 5;
  if(days === "3") score -= 10;
  if(days === "4") score -= 15;

  if(heavy === "ja") score -= 8;

  score = Math.round(clamp(score, 0, 100));

  let verdict = "";
  let verdictClass = "mid";
  let actie = "";
  let nietDoen = "";
  let dagtype = "";
  let zone = "";
  let stappen = "";
  let waarom = "";
  let rodeVlag = "";

  if(score < 50){
    verdict = "STOP";
    verdictClass = "bad";
    dagtype = "herstel";
    actie = "rust / korte wandeling";
    nietDoen = "geen training";
    zone = "zone 1";
    stappen = "5000–6500";
    waarom = "je herstel staat onder druk";
  }
  else if(score < 60){
    verdict = "HERSTEL";
    verdictClass = "mid";
    dagtype = "rustig actief";
    actie = "15–20 min wandelen of yoga";
    nietDoen = "geen intensiteit";
    zone = "zone 1";
    stappen = "6000–7500";
    waarom = "voldoende om te bewegen, niet genoeg om te trainen";
  }
  else if(score < 70){
    verdict = "TRAIN LICHT";
    verdictClass = "mid";
    dagtype = "licht actief";
    actie = "20–25 min zone 2 (ochtend)";
    nietDoen = "niet tot uitputting";
    zone = "lage zone 2";
    stappen = "7000–8500";
    waarom = "je zit in de opbouwzone";
  }
  else if(score < 80){
    verdict = "TRAIN";
    verdictClass = "good";
    dagtype = "trainbaar";
    actie = "30–35 min zone 2 (ochtend)";
    nietDoen = "geen tweede zware prikkel";
    zone = "zone 2";
    stappen = "7500–9000";
    waarom = "cijfers laten training toe, maar nog gecontroleerd";
  }
  else{
    verdict = "STERKE DAG";
    verdictClass = "good";
    dagtype = "sterke dag";
    actie = "40–45 min training (ochtend)";
    nietDoen = "niet dom forceren";
    zone = "zone 2 / stevig";
    stappen = "8500–10000";
    waarom = "goede combinatie van energie en herstel";
  }

  // harde beveiligingen
  if(stress > 40){
    verdict = "AFREMMEN";
    verdictClass = "bad";
    actie = "korter trainen of wandelen";
    nietDoen = "geen intensiteit";
    zone = "zone 1";
    stappen = "6000–7500";
    waarom = "stress ligt te hoog";
    rodeVlag = "Stress is hoog. Vandaag niet doorduwen.";
  }

  if(heavy === "ja" && score >= 70){
    actie = "20–30 min zone 2 (ochtend)";
    nietDoen = "geen tweede zware prikkel";
    waarom = "gisteren was al zwaar";
    if(!rodeVlag) rodeVlag = "Gisteren was zwaar. Vandaag bewust onder controle blijven.";
  }

  if(days === "3" || days === "4"){
    if(score >= 70){
      actie = "20–30 min zone 2 (ochtend)";
      nietDoen = "geen vierde zware dag";
      waarom = "je zit te dicht tegen overbelasting";
    }
    if(!rodeVlag) rodeVlag = "Meerdere dagen op rij getraind. Vandaag belasting bewaken.";
  }

  if(hrv < 40){
    rodeVlag = rodeVlag ? rodeVlag + " HRV is laag." : "HRV is laag.";
  }

  if(sleep < 55){
    rodeVlag = rodeVlag ? rodeVlag + " Slaap remt af." : "Slaap remt af.";
  }

  if(darmen === "slecht"){
    rodeVlag = rodeVlag ? rodeVlag + " Hou het simpel voor je buik." : "Hou het simpel voor je buik.";
    actie = "korte rustige wandeling";
    nietDoen = "geen training";
    zone = "zone 1";
  }

  if(lichaam === "stijf" && verdict !== "STOP" && verdict !== "AFREMMEN"){
    actie += " + mobiliteit";
  }

  document.getElementById("result").innerHTML = `
    <div class="verdict ${verdictClass}">${verdict}</div>

    <div class="action">
      <div class="kicker">Doen</div>
      <div class="do">${actie}</div>

      <div class="kicker">Waarom</div>
      <div class="text">${waarom}</div>

      <div class="kicker">Niet doen</div>
      <div class="text">${nietDoen}</div>
    </div>

    ${rodeVlag ? `<div class="flag bad">${rodeVlag}</div>` : ""}

    <div class="stats">
      <div class="stat">
        <small>Readiness</small>
        <b>${score}</b>
      </div>
      <div class="stat">
        <small>Dagtype</small>
        <b>${dagtype}</b>
      </div>
      <div class="stat">
        <small>Hartslag</small>
        <b>${zone}</b>
      </div>
      <div class="stat">
        <small>Stappen</small>
        <b>${stappen}</b>
      </div>
    </div>
  `;
}
</script>
</body>
</html>
