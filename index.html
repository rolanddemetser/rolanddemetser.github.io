<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#f3f4f6" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>Pro coach RDM</title>

  <style>
    :root{
      --bg:#f3f4f6;
      --card:#ffffff;
      --text:#111111;
      --muted:#6b7280;
      --line:#e5e7eb;
      --soft:#f9fafb;

      --good:#dff7e6;
      --mid:#fff1cc;
      --bad:#ffd9d9;

      --shadow:0 8px 22px rgba(0,0,0,0.05);
      --radius:20px;
    }

    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .wrap{
      max-width:760px;
      margin:0 auto;
      padding:16px 16px 36px;
    }

    h1{
      margin:0 0 6px;
      font-size:34px;
      line-height:1.02;
      font-weight:900;
      letter-spacing:-0.8px;
    }

    .sub{
      margin:0 0 18px;
      color:var(--muted);
      font-size:17px;
      line-height:1.3;
      font-weight:700;
    }

    .card{
      background:var(--card);
      border-radius:var(--radius);
      padding:16px;
      margin-bottom:16px;
      box-shadow:var(--shadow);
    }

    .section-title{
      margin:0 0 12px;
      font-size:22px;
      font-weight:900;
      letter-spacing:-0.2px;
    }

    .divider{
      height:1px;
      background:var(--line);
      margin:16px 0;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr;
      gap:12px;
    }

    @media (min-width:720px){
      .grid.two{
        grid-template-columns:1fr 1fr;
      }
    }

    label{
      display:block;
      margin:0 0 6px;
      font-size:14px;
      font-weight:900;
      color:var(--muted);
      text-transform:uppercase;
      letter-spacing:0.5px;
    }

    input, select{
      width:100%;
      padding:14px;
      border-radius:14px;
      border:1px solid #d1d5db;
      background:#fff;
      color:#111;
      font-size:18px;
      appearance:none;
      -webkit-appearance:none;
    }

    button{
      width:100%;
      margin-top:16px;
      padding:17px;
      border:none;
      border-radius:14px;
      background:#111;
      color:#fff;
      font-size:20px;
      font-weight:900;
      cursor:pointer;
    }

    .pill{
      display:inline-block;
      padding:8px 12px;
      border-radius:999px;
      background:#eef2f7;
      color:#374151;
      font-size:13px;
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:0.5px;
      margin-bottom:10px;
    }

    .verdict{
      padding:18px;
      border-radius:16px;
      font-size:28px;
      line-height:1.06;
      font-weight:900;
      text-align:center;
      margin-bottom:12px;
      letter-spacing:-0.5px;
    }

    .good{ background:var(--good); }
    .mid{ background:var(--mid); }
    .bad{ background:var(--bad); }

    .alert{
      background:var(--bad);
      border-radius:16px;
      padding:16px;
      margin-bottom:12px;
      font-size:19px;
      line-height:1.28;
      font-weight:900;
    }

    .block{
      background:#fff;
      border:1px solid var(--line);
      border-radius:16px;
      padding:16px;
      margin-bottom:12px;
    }

    .kicker{
      margin-bottom:8px;
      font-size:13px;
      color:var(--muted);
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:0.7px;
    }

    .main{
      font-size:30px;
      line-height:1.08;
      font-weight:900;
      letter-spacing:-0.5px;
    }

    .text{
      font-size:18px;
      line-height:1.35;
      color:#4b5563;
      font-weight:800;
    }

    .stats{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-top:4px;
    }

    @media (min-width:720px){
      .stats{
        grid-template-columns:repeat(4,1fr);
      }
    }

    .stat{
      background:var(--soft);
      border:1px solid var(--line);
      border-radius:14px;
      padding:12px;
    }

    .stat small{
      display:block;
      margin-bottom:4px;
      color:var(--muted);
      font-size:12px;
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:0.5px;
    }

    .stat b{
      display:block;
      font-size:22px;
      line-height:1.1;
      letter-spacing:-0.4px;
    }

    .empty{
      color:var(--muted);
      font-size:18px;
      font-weight:700;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>🔥 Pro coach RDM</h1>
    <div class="sub">Nieuwe basis. Eén duidelijke beslissing per dag.</div>

    <div class="card">
      <div class="section-title">Herstel</div>
      <div class="grid two">
        <div>
          <label for="bb">Body Battery</label>
          <input id="bb" type="number" min="0" max="100" value="63">
        </div>
        <div>
          <label for="sleep">Slaapscore</label>
          <input id="sleep" type="number" min="0" max="100" value="69">
        </div>
        <div>
          <label for="hrv">HRV</label>
          <input id="hrv" type="number" min="0" max="120" value="53">
        </div>
        <div>
          <label for="stress">Stress</label>
          <input id="stress" type="number" min="0" max="100" value="20">
        </div>
      </div>

      <div class="divider"></div>

      <div class="section-title">Check-in</div>
      <div class="grid two">
        <div>
          <label for="gevoel">Gevoel</label>
          <select id="gevoel">
            <option value="goed">goed</option>
            <option value="ok" selected>ok</option>
            <option value="slecht">slecht</option>
          </select>
        </div>
        <div>
          <label for="lichaam">Lichaam</label>
          <select id="lichaam">
            <option value="fris" selected>fris</option>
            <option value="stijf">stijf</option>
            <option value="moe">moe</option>
          </select>
        </div>
        <div>
          <label for="darmen">Darmen</label>
          <select id="darmen">
            <option value="goed" selected>goed</option>
            <option value="traag">traag</option>
            <option value="slecht">slecht</option>
          </select>
        </div>
        <div>
          <label for="fatigue">Vermoeidheid stijgt?</label>
          <select id="fatigue">
            <option value="nee" selected>nee</option>
            <option value="ja">ja</option>
          </select>
        </div>
      </div>

      <div class="divider"></div>

      <div class="section-title">Belasting</div>
      <div class="grid two">
        <div>
          <label for="days">Dagen op rij getraind</label>
          <select id="days">
            <option value="0">0</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3" selected>3</option>
            <option value="4">4+</option>
          </select>
        </div>
        <div>
          <label for="heavy">Gisteren zwaar?</label>
          <select id="heavy">
            <option value="nee" selected>nee</option>
            <option value="ja">ja</option>
          </select>
        </div>
        <div>
          <label for="trend">Trend laatste 3 dagen</label>
          <select id="trend">
            <option value="beter">beter</option>
            <option value="stabiel" selected>stabiel</option>
            <option value="slechter">slechter</option>
          </select>
        </div>
        <div>
          <label for="followed">Gisteren advies gevolgd?</label>
          <select id="followed">
            <option value="ja" selected>ja</option>
            <option value="nee">nee</option>
          </select>
        </div>
      </div>

      <button onclick="bereken()">Bepaal mijn dag</button>
    </div>

    <div class="card" id="result">
      <div class="empty">Nog niets berekend</div>
    </div>
  </div>

  <script>
    function clamp(x, min, max){
      return Math.max(min, Math.min(max, x));
    }

    function hrvToScore(hrv){
      if(hrv >= 75) return 92;
      if(hrv >= 65) return 84;
      if(hrv >= 55) return 76;
      if(hrv >= 45) return 66;
      if(hrv >= 35) return 52;
      return 38;
    }

    function bereken(){
      const bb = clamp(parseInt(document.getElementById("bb").value) || 0, 0, 100);
      const sleep = clamp(parseInt(document.getElementById("sleep").value) || 0, 0, 100);
      const hrv = clamp(parseInt(document.getElementById("hrv").value) || 0, 0, 120);
      const stress = clamp(parseInt(document.getElementById("stress").value) || 0, 0, 100);

      const gevoel = document.getElementById("gevoel").value;
      const lichaam = document.getElementById("lichaam").value;
      const darmen = document.getElementById("darmen").value;
      const fatigue = document.getElementById("fatigue").value;

      const daysRaw = document.getElementById("days").value;
      const days = daysRaw === "4" ? 4 : parseInt(daysRaw) || 0;
      const heavy = document.getElementById("heavy").value;
      const trend = document.getElementById("trend").value;
      const followed = document.getElementById("followed").value;

      let score =
        (bb * 0.30) +
        (sleep * 0.25) +
        (hrvToScore(hrv) * 0.25) +
        ((100 - stress) * 0.20);

      if (gevoel === "goed") score += 5;
      if (gevoel === "slecht") score -= 10;

      if (lichaam === "fris") score += 3;
      if (lichaam === "stijf") score -= 6;
      if (lichaam === "moe") score -= 15;

      if (darmen === "traag") score -= 4;
      if (darmen === "slecht") score -= 10;

      if (days === 2) score -= 5;
      if (days === 3) score -= 12;
      if (days >= 4) score -= 18;

      if (heavy === "ja") score -= 8;
      if (trend === "beter") score += 3;
      if (trend === "slechter") score -= 8;
      if (fatigue === "ja") score -= 8;
      if (followed === "nee") score -= 6;

      score = Math.round(clamp(score, 0, 100));

      let verdict = "";
      let verdictClass = "mid";
      let reason = "";
      let action = "";
      let limit = "";
      let coach = "";
      let tomorrow = "";
      let zone = "";
      let steps = "";
      let daytype = "";
      let alert = "";
      let weekLoad = "";
      let weekTrend = "";
      let weekAction = "";

      if (stress > 45) {
        verdict = "AFREMMEN";
        verdictClass = "bad";
        reason = "Stress ligt te hoog.";
        action = "20–30 min rustig wandelen. Meer niet.";
        limit = "geen training, geen intensiteit";
        coach = "Vandaag rem je. Niet onderhandelen.";
        tomorrow = "Alleen remmen houdt morgen bruikbaar.";
        zone = "zone 1";
        steps = "6000–7500";
        daytype = "afremmen";
        alert = "Vandaag geen extra trainingsdruk.";
      } else if (darmen === "slecht") {
        verdict = "HERSTELDAG";
        verdictClass = "bad";
        reason = "Buik is vandaag de beperkende factor.";
        action = "Korte rustige wandeling of niets.";
        limit = "geen training";
        coach = "Vandaag simpel houden.";
        tomorrow = "Rust vandaag voorkomt extra last morgen.";
        zone = "zone 1";
        steps = "5000–7000";
        daytype = "herstel";
        alert = "Vandaag buik eerst, training niet.";
      } else if (days >= 3 && trend === "slechter") {
        verdict = "AFREMMEN";
        verdictClass = "bad";
        reason = "Belasting stapelt op en je trend daalt.";
        action = "20 min wandelen of rustige yoga. Geen zone 2.";
        limit = "geen trainingsprikkel";
        coach = "Vandaag trek je de rem op.";
        tomorrow = "Niet afremmen = morgen slechter.";
        zone = "zone 1";
        steps = "6000–7500";
        daytype = "afremmen";
        alert = "Negatieve opstapeling. Vandaag remmen.";
      } else if (days >= 3 && followed === "nee") {
        verdict = "HERSTELDAG";
        verdictClass = "bad";
        reason = "Je negeerde gisteren de grens terwijl de belasting al opliep.";
        action = "20 min rustig wandelen. Niet meer.";
        limit = "geen zone 2 vandaag";
        coach = "Coach corrigeert. Vandaag lager.";
        tomorrow = "Vandaag corrigeren maakt morgen opnieuw mogelijk.";
        zone = "zone 1";
        steps = "6000–7500";
        daytype = "herstel";
        alert = "Vandaag verplicht lager.";
      } else if (days >= 3 || fatigue === "ja") {
        verdict = "BEWUST LICHT";
        verdictClass = "mid";
        reason = "Opstapeling begint te tellen.";
        action = "20–25 min rustige zone 2 (ochtend). Niet meer.";
        limit = "geen versnelling, geen verlenging, geen tweede training";
        coach = "Je zit in opstapeling. Minder doen is vandaag juist.";
        tomorrow = "Vandaag terugnemen geeft morgen opnieuw ruimte.";
        zone = "lage zone 2";
        steps = "7000–8500";
        daytype = "licht actief";
        alert = "Vandaag verlaag je belasting.";
      } else if (heavy === "ja" && score >= 60) {
        verdict = "LICHT TRAINEN";
        verdictClass = "mid";
        reason = "Gisteren zat de zware prikkel al.";
        action = "20–25 min zone 2.";
        limit = "geen tweede zware prikkel";
        coach = "Vandaag onderhoud, niet verhogen.";
        tomorrow = "Beheersing vandaag bewaart opties voor morgen.";
        zone = "lage zone 2";
        steps = "7000–8500";
        daytype = "licht actief";
        alert = "Vandaag gecontroleerd houden.";
      } else if (score < 48) {
        verdict = "STOP";
        verdictClass = "bad";
        reason = "Herstel is onvoldoende.";
        action = "Geen training.";
        limit = "volledige rust of enkel los wandelen";
        coach = "Vandaag stoppen.";
        tomorrow = "Rust vandaag voorkomt verder wegzakken.";
        zone = "zone 1";
        steps = "5000–6500";
        daytype = "herstel";
        alert = "Vandaag niet trainen.";
      } else if (score < 58) {
        verdict = "HERSTELDAG";
        verdictClass = "mid";
        reason = "Paraatheid is te laag voor echte trainingswinst.";
        action = "20 min wandelen. Rustig.";
        limit = "geen intensiteit";
        coach = "Vandaag herstel voorrang geven.";
        tomorrow = "Herstel vandaag vergroot je kans op een betere morgen.";
        zone = "zone 1";
        steps = "6000–7500";
        daytype = "herstel";
        alert = "Vandaag bewust rustiger.";
      } else if (score < 70) {
        verdict = "LICHT TRAINEN";
        verdictClass = "mid";
        reason = "Goed genoeg om te bewegen, niet om te pushen.";
        action = "25 min zone 2.";
        limit = "niet pushen";
        coach = "Vandaag onderhouden, geen ambitie.";
        tomorrow = "Controle vandaag houdt je stabiel.";
        zone = "lage zone 2";
        steps = "7000–8500";
        daytype = "licht actief";
        alert = "Vandaag gecontroleerd trainen.";
      } else {
        verdict = "OPBOUWEN";
        verdictClass = "good";
        reason = "Je cijfers laten een gecontroleerde prikkel toe.";
        action = "30–40 min zone 2.";
        limit = "geen tweede zware prikkel";
        coach = "Vandaag mag je bouwen, maar strak gedoseerd.";
        tomorrow = "Goed doseren vandaag houdt morgen bruikbaar.";
        zone = "zone 2";
        steps = "7500–9500";
        daytype = "trainbaar";
        alert = "Vandaag mag je opbouwen.";
      }

      if (lichaam === "stijf" && !["STOP","AFREMMEN","HERSTELDAG"].includes(verdict)) {
        action += " + 5–10 min mobiliteit";
      }

      weekLoad = "laag";
      if (days === 2) weekLoad = "matig";
      if (days === 3) weekLoad = "hoog";
      if (days >= 4) weekLoad = "zeer hoog";
      if (heavy === "ja" && days >= 2) weekLoad = "hoog";

      weekTrend = "stabiel";
      if (trend === "beter") weekTrend = "stijgend";
      if (trend === "slechter") weekTrend = "dalend";
      if (trend === "stabiel" && days >= 3) weekTrend = "stabiel maar kwetsbaar";

      weekAction = "stabiel houden";
      if (verdict === "OPBOUWEN") weekAction = "gecontroleerd verderbouwen";
      if (verdict === "LICHT TRAINEN") weekAction = "niet verhogen";
      if (verdict === "BEWUST LICHT") weekAction = "24u belasting verlagen";
      if (verdict === "HERSTELDAG") weekAction = "herstel prioriteit geven";
      if (verdict === "AFREMMEN") weekAction = "hard afremmen";
      if (verdict === "STOP") weekAction = "stop";

      document.getElementById("result").innerHTML = `
        <div class="pill">Dagsturing</div>

        <div class="verdict ${verdictClass}">${verdict}</div>

        <div class="block">
          <div class="kicker">Belangrijkste reden</div>
          <div class="text">${reason}</div>
        </div>

        <div class="alert">${alert}</div>

        <div class="block">
          <div class="kicker">Actie vandaag</div>
          <div class="main">${action}</div>
        </div>

        <div class="block">
          <div class="kicker">Harde grens</div>
          <div class="text">${limit}</div>
        </div>

        <div class="block">
          <div class="kicker">Coachbesluit</div>
          <div class="text">${coach}</div>
        </div>

        <div class="block">
          <div class="kicker">Impact op morgen</div>
          <div class="text">${tomorrow}</div>
        </div>

        <div class="stats">
          <div class="stat">
            <small>Readiness</small>
            <b>${score}</b>
          </div>
          <div class="stat">
            <small>Zone</small>
            <b>${zone}</b>
          </div>
          <div class="stat">
            <small>Stappen</small>
            <b>${steps}</b>
          </div>
          <div class="stat">
            <small>Dagtype</small>
            <b>${daytype}</b>
          </div>
        </div>

        <div class="block" style="margin-top:12px;">
          <div class="kicker">Weekstatus</div>
          <div class="text"><strong>Belasting:</strong> ${weekLoad}</div>
          <div class="text" style="margin-top:8px;"><strong>Trend:</strong> ${weekTrend}</div>
          <div class="text" style="margin-top:8px;"><strong>Actie:</strong> ${weekAction}</div>
        </div>
      `;
    }
  </script>
</body>
</html>
